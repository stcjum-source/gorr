<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>권능·가영 가계부 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#e8e8e8;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:#e0e0e0;--border2:#ccc;
  --r:10px;--r-sm:7px;
  --green-bg:#eaf3de;--green:#3b6d11;
  --red-bg:#fcebeb;--red:#c0392b;
  --accent:#2d2d2d;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f0f0f0;--text2:#aaa;--text3:#555;
  --border:#3a3a3c;--border2:#555;
  --green-bg:#1a3a12;--green:#8fd46a;
  --red-bg:#3b1a1a;--red:#e08080;
  --accent:#e0e0e0;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);background:var(--bg2);min-height:100vh}
.app{max-width:420px;margin:0 auto;min-height:100vh}
.header{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.header h1{font-size:15px;font-weight:600;margin-bottom:12px}
.month-tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.month-tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;border-radius:var(--r-sm) var(--r-sm) 0 0;font-size:13px;color:var(--text2);cursor:pointer;border:1px solid transparent;border-bottom:none;background:transparent;white-space:nowrap}
.tab.active{background:var(--bg);border-color:var(--border);color:var(--text);font-weight:600}
.section{padding:12px 14px 40px}
.income-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.income-row{display:flex;align-items:center;padding:10px 13px;border-bottom:1px solid var(--border)}
.income-row:last-child{border-bottom:none}
.income-label{font-size:12px;color:var(--text2);width:90px;flex-shrink:0}
.income-input{flex:1;border:none;background:transparent;font-size:15px;font-weight:500;text-align:right;color:var(--text);outline:none;font-family:inherit}
.income-unit{font-size:12px;color:var(--text3);margin-left:3px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px}
.card.green{background:var(--green-bg);border-color:transparent}
.card.red{background:var(--red-bg);border-color:transparent}
.card-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.card.green .card-label,.card.red .card-label{opacity:.7}
.card-val{font-size:18px;font-weight:700;letter-spacing:-.5px}
.card.green .card-val{color:var(--green)}
.card.red .card-val{color:var(--red)}
.card-sub{font-size:11px;color:var(--text3);margin-top:3px}
.toggle-row{display:flex;gap:6px;margin-bottom:12px}
.toggle-btn{flex:1;padding:8px 4px;border:1px solid var(--border2);border-radius:var(--r-sm);font-size:12px;background:var(--bg);cursor:pointer;color:var(--text2);font-family:inherit}
.toggle-btn.on{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:500}
.sec-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.add-btn{background:var(--bg);border:1px solid var(--border2);border-radius:var(--r-sm);padding:5px 12px;font-size:12px;color:var(--text);cursor:pointer;font-family:inherit;font-weight:500}
.add-form{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.add-form.edit-mode{border-color:var(--accent);border-width:2px}
.form-row{margin-bottom:9px}
.form-row label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
.form-row input,.form-row select{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:var(--r-sm);font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none;appearance:none}
.form-row input:focus,.form-row select:focus{border-color:var(--accent)}
.form-actions{display:flex;gap:7px;margin-top:12px}
.btn-save{flex:1;padding:10px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-cancel{padding:10px 15px;background:transparent;border:1px solid var(--border2);border-radius:var(--r-sm);font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit}
.expense-list{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.expense-item{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border-bottom:1px solid var(--border)}
.expense-item:last-child{border-bottom:none}
.exp-left{flex:1;min-width:0;margin-right:8px}
.exp-cat{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;background:var(--bg2);color:var(--text2);margin-bottom:3px}
.exp-name{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exp-date{font-size:11px;color:var(--text3);margin-top:2px}
.exp-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.exp-amt{font-size:13px;font-weight:600;white-space:nowrap}
.exp-amt.neg{color:var(--red)}
.icon-btn{background:none;border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text2);cursor:pointer;font-size:12px;padding:4px 8px;font-family:inherit}
.icon-btn.del{color:var(--red);border-color:transparent}
.empty{text-align:center;padding:36px 16px;color:var(--text3);font-size:13px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r)}
.empty-icon{font-size:28px;margin-bottom:8px}
.cat-wrap{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.cat-row{margin-bottom:12px}
.cat-row:last-child{margin-bottom:0}
.cat-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.cat-pct{font-size:11px;color:var(--text3)}
.bar-bg{background:var(--bg3);border-radius:3px;height:7px;overflow:hidden}
.bar-fill{height:100%;background:var(--accent);border-radius:3px}
.fixed-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.fixed-header{padding:8px 13px;background:var(--bg2);font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.fixed-item{display:flex;align-items:center;padding:9px 13px;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
.fixed-item:last-child{border-bottom:none}
.fixed-name{flex:1}
.fixed-input{border:1px solid var(--border2);border-radius:var(--r-sm);padding:5px 9px;font-size:13px;font-weight:500;text-align:right;width:120px;background:var(--bg);color:var(--text);font-family:inherit;outline:none}
.fixed-input:focus{border-color:var(--accent)}
.fixed-unit{font-size:11px;color:var(--text3);flex-shrink:0}
.fixed-total-row{display:flex;justify-content:space-between;padding:10px 13px;font-size:13px;font-weight:600}
.saving-label{color:var(--green)}
.save-bar{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.save-hint{font-size:12px;color:var(--text2)}
.btn-fixed-save{background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-sm);padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📒 권능·가영 가계부 2026</h1>
    <div class="month-tabs" id="tabs"></div>
  </div>
  <div class="section" id="content"></div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
// ── Firebase 설정 ─────────────────────────────────────────────
const FB_CFG={
  apiKey:"AIzaSyDv3nx30HUyv51AVgsutEUfaHz1JGwrl4k",
  authDomain:"gorr-66f73.firebaseapp.com",
  databaseURL:"https://gorr-66f73-default-rtdb.firebaseio.com",
  projectId:"gorr-66f73",
  storageBucket:"gorr-66f73.firebasestorage.app",
  messagingSenderId:"530517431482",
  appId:"1:530517431482:web:34828eca983f277baf5e83"
};
let db=null, ROOM=localStorage.getItem('gagebu_room');
let liveData={};

// ── 기본 데이터 ───────────────────────────────────────────────
const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DEF_CATS=['식비','식재료','회사식비','교통/주유','건강','스킨케어','미용','쇼핑','문화/여가','교육비','여행','가족/효도','결혼준비','생활용품','경조사','기타'];
function getCats(){return liveData['cats26']||DEF_CATS;}
function saveCats(arr){fbSet('cats26',arr);}
const DEF_FIXED=[
  {id:'f1',name:'보험 합계 (권능)',amt:90570,tag:'권능'},
  {id:'f2',name:'용돈 (권능)',amt:300000,tag:'권능'},
  {id:'f3',name:'보험 합계 (가영)',amt:66010,tag:'가영'},
  {id:'f4',name:'용돈 (가영)',amt:300000,tag:'가영'},
  {id:'f5',name:'회사 공조회 대출',amt:1036320,tag:'공통'},
  {id:'f6',name:'전세 대출이자',amt:410958,tag:'공통'},
  {id:'f7',name:'관리비',amt:200000,tag:'공통'},
  {id:'f8',name:'통신비',amt:118200,tag:'공통'},
  {id:'f9',name:'정기구독',amt:18290,tag:'공통'},
];
const DEF_SAVINGS=[
  {id:'s1',name:'연금저축 (권능)',amt:300000},
  {id:'s2',name:'연금저축 (가영)',amt:300000},
];

// ── 데이터 읽기/쓰기 ─────────────────────────────────────────
function getFixed(){return liveData['fg26']||DEF_FIXED;}
function getSav(){return liveData['sg26']||DEF_SAVINGS;}
function getIncArr(m){return liveData['ia26_'+m]||[];}
function setIncArr(m,v){fbSet('ia26_'+m,v);}
function getExps(m){return liveData['e26_'+m]||[];}
function setExps(m,a){fbSet('e26_'+m,a);return true;}
function ft(){return getFixed().reduce((s,i)=>s+(Number(i.amt)||0),0);}
function st(){return getSav().reduce((s,i)=>s+(Number(i.amt)||0),0);}

function fbSet(key,val){
  liveData[key]=val; // 즉시 로컬 반영
  if(db&&ROOM) db.ref(`budgets/${ROOM}/${key}`).set(val);
}

// ── Firebase 연결 ────────────────────────────────────────────
function initFirebase(){
  if(!firebase.apps.length) firebase.initializeApp(FB_CFG);
  db=firebase.database();
  // 기존 localStorage 데이터 Firebase로 마이그레이션
  db.ref(`budgets/${ROOM}`).once('value',snap=>{
    if(!snap.val()){
      const mig={};let has=false;
      const keys=['fg26','sg26','cats26'];
      for(let m=0;m<12;m++){keys.push('e26_'+m);keys.push('ia26_'+m);}
      keys.forEach(k=>{
        try{const v=localStorage.getItem(k);if(v){mig[k]=JSON.parse(v);has=true;}}catch(e){}
      });
      if(has){db.ref(`budgets/${ROOM}`).set(mig);console.log('기존 데이터 이전 완료');}
    }
    // 실시간 리스닝
    db.ref(`budgets/${ROOM}`).on('value',s=>{
      liveData=s.val()||{};
      if(!S.showForm&&!S.showIncForm) render();
    });
  });
}

const today=new Date();
let S={month:today.getMonth(),view:'list',person:'권능',showForm:false,editIdx:null,addingCat:false,showIncForm:false,incEditIdx:null};

const INC_TYPES=['권능 월급','가영 월급','부수입 (권능)','부수입 (가영)','기타'];

function fmt(n){return Math.abs(Math.round(n)).toLocaleString('ko-KR')+'원';}
function fmtS(n){
  const a=Math.abs(Math.round(n)),sg=n<0?'-':'';
  if(a>=10000000)return sg+(a/10000000).toFixed(1)+'억';
  if(a>=1000000)return sg+(a/1000000).toFixed(1)+'백만';
  if(a>=10000)return sg+(a/10000).toFixed(1)+'만';
  return sg+a.toLocaleString('ko-KR');
}
function todayStr(){
  return `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
}

function renderTabs(){
  document.getElementById('tabs').innerHTML=MONTHS.map((m,i)=>
    `<div class="tab ${i===S.month?'active':''}" onclick="selM(${i})">${m}</div>`
  ).join('');
  setTimeout(()=>{const a=document.querySelector('.tab.active');if(a)a.scrollIntoView({block:'nearest',inline:'center'});},50);
}

function render(){
  renderTabs();
  const m=S.month;
  const incArr=getIncArr(m), exps=getExps(m);
  const FT=ft(),ST=st();
  const totalInc=incArr.reduce((s,i)=>s+(Number(i.amt)||0),0);
  const totalVar=exps.reduce((s,e)=>s+(Number(e.amt)||0),0);
  const bal=totalInc-FT-ST-totalVar;

  const catMap={};
  exps.forEach(e=>{catMap[e.cat]=(catMap[e.cat]||0)+(Number(e.amt)||0);});
  const catList=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxCat=catList.length?catList[0][1]:1;

  let h=`
  <div class="cards">
    <div class="card"><div class="card-label">수입 합계</div><div class="card-val">${fmtS(totalInc)}</div><div class="card-sub">${totalInc>0?fmt(totalInc):'수입을 추가해주세요'}</div></div>
    <div class="card"><div class="card-label">고정 + 저축</div><div class="card-val">${fmtS(FT+ST)}</div><div class="card-sub">고정 ${fmtS(FT)} · 저축 ${fmtS(ST)}</div></div>
    <div class="card"><div class="card-label">변동지출</div><div class="card-val">${fmtS(totalVar)}</div><div class="card-sub">${exps.length}건</div></div>
    <div class="card ${bal>=0?'green':'red'}"><div class="card-label">이달 잔액</div><div class="card-val">${fmtS(bal)}</div><div class="card-sub">${totalInc>0?'저축률 '+(ST/totalInc*100).toFixed(1)+'%':'수입 입력 필요'}</div></div>
  </div>
  <div class="toggle-row">
    <button class="toggle-btn ${S.view==='income'?'on':''}" onclick="setV('income')">수입</button>
    <button class="toggle-btn ${S.view==='list'?'on':''}" onclick="setV('list')">지출</button>
    <button class="toggle-btn ${S.view==='cat'?'on':''}" onclick="setV('cat')">항목별</button>
    <button class="toggle-btn ${S.view==='fixed'?'on':''}" onclick="setV('fixed')">고정지출</button>
  </div>`;

  if(S.view==='income'){
    h+=`<div class="sec-title"><span>수입 내역 ${incArr.length}건</span><button class="add-btn" onclick="openIncForm(null)">+ 추가</button></div>`;
    if(S.showIncForm){
      const isE=S.incEditIdx!=null;
      const e=isE?incArr[S.incEditIdx]:{};
      h+=`<div class="add-form ${isE?'edit-mode':''}">
        <div class="form-row"><label>날짜</label><input type="date" id="iDate" value="${e.date||todayStr()}"></div>
        <div class="form-row"><label>종류</label><select id="iType">${INC_TYPES.map(t=>`<option ${t===(e.type||INC_TYPES[0])?'selected':''}>${t}</option>`).join('')}</select></div>
        <div class="form-row"><label>메모 (선택)</label><input type="text" id="iName" placeholder="예: 5월 급여, 프리랜서" value="${e.name||''}"></div>
        <div class="form-row"><label>금액 (원)</label><input type="number" id="iAmt" inputmode="numeric" placeholder="0" value="${e.amt||''}"></div>
        <div class="form-actions">
          <button class="btn-cancel" onclick="closeIncForm()">취소</button>
          <button class="btn-save" onclick="saveInc()">${isE?'수정 완료':'저장'}</button>
        </div>
      </div>`;
    }
    if(incArr.length===0){
      h+=`<div class="empty"><div class="empty-icon">💰</div>수입 내역을 추가해보세요</div>`;
    }else{
      const sorted=[...incArr.entries()].sort((a,b)=>(b[1].date||'')>(a[1].date||'')?1:-1);
      h+=`<div class="expense-list">`;
      sorted.forEach(([oi,e])=>{
        h+=`<div class="expense-item">
          <div class="exp-left">
            <div class="exp-cat" style="background:var(--green-bg);color:var(--green)">${e.type}</div>
            <div class="exp-name">${e.name||e.type}</div>
            <div class="exp-date">${e.date||''}</div>
          </div>
          <div class="exp-right">
            <div class="exp-amt" style="color:var(--green)">+${fmt(e.amt)}</div>
            <button class="icon-btn" onclick="openIncForm(${oi})">수정</button>
            <button class="icon-btn del" onclick="delInc(${oi})">✕</button>
          </div>
        </div>`;
      });
      h+=`</div>`;
    }
  }

  if(S.view==='list'){
    const keunExps=exps.filter(e=>e.who==='권능');
    const gayExps=exps.filter(e=>e.who==='가영');
    const keunTotal=keunExps.reduce((s,e)=>s+(Number(e.amt)||0),0);
    const gayTotal=gayExps.reduce((s,e)=>s+(Number(e.amt)||0),0);
    const curExps=S.person==='권능'?keunExps:S.person==='가영'?gayExps:exps;
    const curIdxMap=S.person==='전체'
      ?exps.map((_,i)=>i)
      :S.person==='권능'
        ?exps.map((e,i)=>e.who==='권능'?i:-1).filter(i=>i>=0)
        :exps.map((e,i)=>e.who==='가영'?i:-1).filter(i=>i>=0);

    h+=`<div style="display:flex;gap:6px;margin-bottom:10px">
      <div style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;${S.person==='권능'?'border-color:var(--accent);border-width:1.5px':''}" onclick="setPerson('권능')">
        <div style="font-size:11px;color:var(--text2);margin-bottom:2px">권능</div>
        <div style="font-size:15px;font-weight:700">${fmtS(keunTotal)}</div>
        <div style="font-size:11px;color:var(--text3)">${keunExps.length}건</div>
      </div>
      <div style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;${S.person==='가영'?'border-color:var(--accent);border-width:1.5px':''}" onclick="setPerson('가영')">
        <div style="font-size:11px;color:var(--text2);margin-bottom:2px">가영</div>
        <div style="font-size:15px;font-weight:700">${fmtS(gayTotal)}</div>
        <div style="font-size:11px;color:var(--text3)">${gayExps.length}건</div>
      </div>
      <div style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;${S.person==='전체'?'border-color:var(--accent);border-width:1.5px':''}" onclick="setPerson('전체')">
        <div style="font-size:11px;color:var(--text2);margin-bottom:2px">전체</div>
        <div style="font-size:15px;font-weight:700">${fmtS(keunTotal+gayTotal)}</div>
        <div style="font-size:11px;color:var(--text3)">${exps.length}건</div>
      </div>
    </div>`;

    h+=`<div class="sec-title"><span>${S.person} 지출 ${curIdxMap.length}건</span><button class="add-btn" onclick="openForm(null)">+ 추가</button></div>`;

    if(S.showForm){
      const isE=S.editIdx!=null;
      const e=isE?exps[S.editIdx]:{};
      const cats=getCats();
      h+=`<div class="add-form ${isE?'edit-mode':''}">
        <div class="form-row"><label>날짜</label><input type="date" id="fDate" value="${e.date||todayStr()}"></div>
        <div class="form-row">
          <label>항목</label>
          <div style="display:flex;gap:6px">
            <select id="fCat" style="flex:1">${cats.map(c=>`<option ${c===(e.cat||cats[0])?'selected':''}>${c}</option>`).join('')}</select>
            <button type="button" onclick="toggleAddCat()" style="flex-shrink:0;padding:0 12px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--bg);color:var(--text);cursor:pointer;font-size:13px">+ 항목</button>
          </div>
        </div>
        <div id="newCatRow" style="display:${S.addingCat?'flex':'none'};gap:6px;margin-top:-4px;margin-bottom:9px">
          <input type="text" id="newCatInput" placeholder="새 항목명" style="flex:1;padding:8px 10px;border:1px solid var(--accent);border-radius:var(--r-sm);font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;outline:none">
          <button onclick="addCat()" style="padding:8px 12px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">추가</button>
        </div>
        <div class="form-row"><label>세부 내용</label><input type="text" id="fName" placeholder="예: 스타벅스, 이마트" value="${e.name||''}"></div>
        <div class="form-row"><label>금액 (원)</label><input type="number" id="fAmt" inputmode="numeric" placeholder="0" value="${e.amt||''}"></div>
        <div class="form-actions">
          <button class="btn-cancel" onclick="closeForm()">취소</button>
          <button class="btn-save" onclick="saveExp()">${isE?'수정 완료':'저장'}</button>
        </div>
      </div>`;
    }

    if(curIdxMap.length===0){
      h+=`<div class="empty"><div class="empty-icon">📋</div>${S.person==='전체'?'지출 내역이 없어요':S.person+' 지출을 추가해보세요'}</div>`;
    }else{
      const sortedCur=curIdxMap.map(oi=>([oi,exps[oi]])).sort((a,b)=>(b[1].date||'')>(a[1].date||'')?1:-1);
      h+=`<div class="expense-list">`;
      sortedCur.forEach(([oi,e])=>{
        const neg=Number(e.amt)<0;
        h+=`<div class="expense-item">
          <div class="exp-left">
            <div class="exp-cat">${e.cat}</div>
            <div class="exp-name">${e.name||'(내용 없음)'}</div>
            <div class="exp-date">${e.date||''}</div>
          </div>
          <div class="exp-right">
            <div class="exp-amt ${neg?'neg':''}">${neg?'-':''}${fmt(e.amt)}</div>
            <button class="icon-btn" onclick="openForm(${oi})">수정</button>
            <button class="icon-btn del" onclick="delExp(${oi})">✕</button>
          </div>
        </div>`;
      });
      h+=`</div>`;
    }
  }

  if(S.view==='cat'){
    const cats=getCats();
    const allCatMap={},keunCatMap={},gayCatMap={};
    exps.forEach(e=>{
      allCatMap[e.cat]=(allCatMap[e.cat]||0)+(Number(e.amt)||0);
      if(e.who==='권능') keunCatMap[e.cat]=(keunCatMap[e.cat]||0)+(Number(e.amt)||0);
      if(e.who==='가영') gayCatMap[e.cat]=(gayCatMap[e.cat]||0)+(Number(e.amt)||0);
    });
    const allCatList=Object.entries(allCatMap).sort((a,b)=>b[1]-a[1]);
    const maxAll=allCatList.length?allCatList[0][1]:1;
    if(!allCatList.length){
      h+=`<div class="empty"><div class="empty-icon">📊</div>지출을 추가하면 항목별 통계가 나와요</div>`;
    }else{
      h+=`<div class="sec-title"><span>항목별 합계 (권능+가영)</span></div><div class="cat-wrap">`;
      allCatList.forEach(([cat,total])=>{
        const pct=totalVar>0?Math.round(total/totalVar*100):0;
        const k=keunCatMap[cat]||0,g=gayCatMap[cat]||0;
        h+=`<div class="cat-row">
          <div class="cat-top"><span>${cat}</span><span><strong>${fmt(total)}</strong> <span class="cat-pct">${pct}%</span></span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(total/maxAll*100)}%"></div></div>
          <div style="display:flex;gap:8px;margin-top:4px;font-size:11px;color:var(--text3)">
            ${k?`<span>권능 ${fmt(k)}</span>`:''}${g?`<span>가영 ${fmt(g)}</span>`:''}
          </div>
        </div>`;
      });
      h+=`</div>`;
    }
    h+=`<div class="sec-title" style="margin-top:14px"><span>항목 관리</span></div>
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden">
      ${cats.map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 13px;border-bottom:1px solid var(--border);font-size:13px">
        <span>${c}</span>
        <button onclick="delCat(${JSON.stringify(c)})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px;line-height:1">×</button>
      </div>`).join('')}
      <div style="padding:10px 13px;display:flex;gap:6px">
        <input id="newCatDirect" type="text" placeholder="새 항목명 입력" style="flex:1;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r-sm);font-size:13px;background:var(--bg);color:var(--text);font-family:inherit;outline:none">
        <button onclick="addCatDirect()" style="padding:7px 14px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">추가</button>
      </div>
    </div>`;
  }

  if(S.view==='fixed'){
    const fi=getFixed(),si=getSav();
    const byT={권능:[],가영:[],공통:[]};
    fi.forEach(it=>{if(byT[it.tag])byT[it.tag].push(it);});
    h+=`<div class="save-bar"><span class="save-hint">수정 후 저장 버튼을 눌러주세요</span><button class="btn-fixed-save" onclick="saveFixed()">저장</button></div>`;
    ['권능','가영','공통'].forEach(tag=>{
      const items=byT[tag];
      const sub=items.reduce((s,i)=>s+(Number(i.amt)||0),0);
      h+=`<div class="fixed-box"><div class="fixed-header"><span>${tag} 고정지출</span><span>${fmt(sub)}</span></div>`;
      items.forEach(it=>{
        h+=`<div class="fixed-item">
          <input class="fixed-input" style="flex:1;width:auto" type="text" data-name="${it.id}" value="${it.name}" placeholder="항목명">
          <input class="fixed-input" style="width:100px" type="number" inputmode="numeric" data-id="${it.id}" value="${it.amt}" oninput="previewFixed()" placeholder="0">
          <span class="fixed-unit">원</span>
          <button onclick="delFixed('${it.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 2px;line-height:1;flex-shrink:0">×</button>
        </div>`;
      });
      h+=`<div style="padding:9px 13px;display:flex;gap:6px;border-top:1px solid var(--border)">
        <input type="text" placeholder="항목명" id="newFN_${tag}" style="flex:1;padding:7px 9px;border:1px solid var(--border2);border-radius:var(--r-sm);font-size:13px;background:var(--bg);color:var(--text);font-family:inherit;outline:none">
        <input type="number" inputmode="numeric" placeholder="금액" id="newFA_${tag}" style="width:90px;padding:7px 9px;border:1px solid var(--border2);border-radius:var(--r-sm);font-size:13px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;text-align:right">
        <button onclick="addFixed('${tag}')" style="padding:7px 11px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0">+</button>
      </div></div>`;
    });
    const savSub=si.reduce((s,i)=>s+(Number(i.amt)||0),0);
    h+=`<div class="fixed-box"><div class="fixed-header"><span class="saving-label">💚 저축 / 투자</span><span class="saving-label">${fmt(savSub)}</span></div>`;
    si.forEach(it=>{
      h+=`<div class="fixed-item">
        <input class="fixed-input" style="flex:1;width:auto" type="text" data-sname="${it.id}" value="${it.name}" placeholder="항목명">
        <input class="fixed-input" style="width:100px" type="number" inputmode="numeric" data-sid="${it.id}" value="${it.amt}" oninput="previewFixed()" placeholder="0">
        <span class="fixed-unit">원</span>
        <button onclick="delSaving('${it.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 2px;line-height:1;flex-shrink:0">×</button>
      </div>`;
    });
    h+=`<div style="padding:9px 13px;display:flex;gap:6px;border-top:1px solid var(--border)">
      <input type="text" placeholder="항목명" id="newSN" style="flex:1;padding:7px 9px;border:1px solid var(--border2);border-radius:var(--r-sm);font-size:13px;background:var(--bg);color:var(--text);font-family:inherit;outline:none">
      <input type="number" inputmode="numeric" placeholder="금액" id="newSA" style="width:90px;padding:7px 9px;border:1px solid var(--border2);border-radius:var(--r-sm);font-size:13px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;text-align:right">
      <button onclick="addSaving()" style="padding:7px 11px;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0">+</button>
    </div></div>
    <div class="fixed-box">
      <div class="fixed-total-row" id="ftRow"><span>총 고정지출</span><span>${fmt(ft())}</span></div>
      <div class="fixed-total-row" id="stRow" style="border-top:1px solid var(--border)"><span class="saving-label">저축 포함 합계</span><span class="saving-label">${fmt(ft()+st())}</span></div>
    </div>`;
  }

  document.getElementById('content').innerHTML=h;
}

function selM(i){S.month=i;S.showForm=false;S.editIdx=null;S.showIncForm=false;S.incEditIdx=null;render();}
function setV(v){S.view=v;S.showForm=false;S.editIdx=null;S.showIncForm=false;S.incEditIdx=null;render();}
function openForm(idx){S.showForm=true;S.editIdx=idx;render();setTimeout(()=>{const el=document.getElementById('fName');if(el)el.focus();},80);}
function closeForm(){S.showForm=false;S.editIdx=null;render();}
function openIncForm(idx){S.showIncForm=true;S.incEditIdx=idx;render();setTimeout(()=>{const el=document.getElementById('iAmt');if(el){el.focus();el.select();}},80);}
function closeIncForm(){S.showIncForm=false;S.incEditIdx=null;render();}

function saveInc(){
  const date=document.getElementById('iDate')?.value||todayStr();
  const type=document.getElementById('iType')?.value||INC_TYPES[0];
  const name=(document.getElementById('iName')?.value||'').trim();
  const amtV=document.getElementById('iAmt')?.value||'';
  const amt=Number(amtV);
  if(!amtV.trim()||isNaN(amt)||amt===0){alert('금액을 입력해주세요');return;}
  const m=S.month,arr=getIncArr(m);
  if(S.incEditIdx!=null){arr[S.incEditIdx]={date,type,name,amt};}
  else{arr.push({date,type,name,amt});}
  arr.sort((a,b)=>(a.date||'')>(b.date||'')?1:-1);
  setIncArr(m,arr);
  S.showIncForm=false;S.incEditIdx=null;render();
}
function delInc(i){
  if(!confirm('삭제할까요?'))return;
  const m=S.month,arr=getIncArr(m);
  arr.splice(i,1);setIncArr(m,arr);render();
}
function setPerson(p){S.person=p;S.showForm=false;S.editIdx=null;render();}
function saveExp(){
  const date=document.getElementById('fDate')?.value||todayStr();
  const cat=document.getElementById('fCat')?.value||getCats()[0];
  const name=(document.getElementById('fName')?.value||'').trim();
  const amtV=document.getElementById('fAmt')?.value||'';
  const amt=Number(amtV);
  if(!amtV.trim()||isNaN(amt)||amt===0){alert('금액을 입력해주세요');return;}
  const who=S.person==='전체'?'권능':S.person;
  const m=S.month,exps=getExps(m);
  if(S.editIdx!=null){exps[S.editIdx]={...exps[S.editIdx],date,cat,name,amt,who};}
  else{exps.push({date,cat,name,amt,who});}
  exps.sort((a,b)=>(a.date||'')>(b.date||'')?1:-1);
  setExps(m,exps);
  S.showForm=false;S.editIdx=null;render();
}
function delExp(i){
  if(!confirm('삭제할까요?'))return;
  const m=S.month,exps=getExps(m);
  exps.splice(i,1);setExps(m,exps);render();
}
function previewFixed(){
  let fSum=0,sSum=0;
  document.querySelectorAll('[data-id]').forEach(el=>fSum+=Number(el.value)||0);
  document.querySelectorAll('[data-sid]').forEach(el=>sSum+=Number(el.value)||0);
  const fr=document.getElementById('ftRow'),sr=document.getElementById('stRow');
  if(fr)fr.innerHTML=`<span>총 고정지출</span><span>${fmt(fSum)}</span>`;
  if(sr)sr.innerHTML=`<span class="saving-label">저축 포함 합계</span><span class="saving-label">${fmt(fSum+sSum)}</span>`;
}
function saveFixed(){
  const fi=getFixed(),si=getSav();
  document.querySelectorAll('[data-name]').forEach(el=>{const it=fi.find(i=>i.id===el.dataset.name);if(it)it.name=el.value.trim()||it.name;});
  document.querySelectorAll('[data-id]').forEach(el=>{const it=fi.find(i=>i.id===el.dataset.id);if(it)it.amt=Number(el.value)||0;});
  document.querySelectorAll('[data-sname]').forEach(el=>{const it=si.find(i=>i.id===el.dataset.sname);if(it)it.name=el.value.trim()||it.name;});
  document.querySelectorAll('[data-sid]').forEach(el=>{const it=si.find(i=>i.id===el.dataset.sid);if(it)it.amt=Number(el.value)||0;});
  fbSet('fg26',fi);fbSet('sg26',si);
  alert('저장됐어요!');render();
}
function delFixed(id){if(!confirm('삭제할까요?'))return;fbSet('fg26',getFixed().filter(i=>i.id!==id));render();}
function addFixed(tag){
  const n=(document.getElementById('newFN_'+tag)?.value||'').trim();
  const a=Number(document.getElementById('newFA_'+tag)?.value)||0;
  if(!n){alert('항목명을 입력해주세요');return;}
  const fi=getFixed();fi.push({id:'f'+Date.now(),name:n,amt:a,tag});
  fbSet('fg26',fi);render();
}
function delSaving(id){if(!confirm('삭제할까요?'))return;fbSet('sg26',getSav().filter(i=>i.id!==id));render();}
function addSaving(){
  const n=(document.getElementById('newSN')?.value||'').trim();
  const a=Number(document.getElementById('newSA')?.value)||0;
  if(!n){alert('항목명을 입력해주세요');return;}
  const si=getSav();si.push({id:'s'+Date.now(),name:n,amt:a});
  fbSet('sg26',si);render();
}
function addCatDirect(){
  const inp=document.getElementById('newCatDirect');
  const name=(inp?.value||'').trim();
  if(!name)return;
  const cats=getCats();
  if(cats.includes(name)){alert('이미 있는 항목이에요');return;}
  cats.splice(cats.length-1,0,name);saveCats(cats);render();
}
function toggleAddCat(){
  S.addingCat=!S.addingCat;
  const row=document.getElementById('newCatRow');
  if(row){row.style.display=S.addingCat?'flex':'none';if(S.addingCat)setTimeout(()=>{const el=document.getElementById('newCatInput');if(el)el.focus();},50);}
}
function addCat(){
  const inp=document.getElementById('newCatInput');
  const name=(inp?.value||'').trim();
  if(!name)return;
  const cats=getCats();
  if(cats.includes(name)){alert('이미 있는 항목이에요');return;}
  cats.splice(cats.length-1,0,name);saveCats(cats);
  S.addingCat=false;
  const sel=document.getElementById('fCat');
  if(sel){const opt=document.createElement('option');opt.value=name;opt.text=name;opt.selected=true;sel.insertBefore(opt,sel.options[sel.options.length-1]);sel.value=name;}
  const row=document.getElementById('newCatRow');if(row)row.style.display='none';
}
function delCat(cat){
  if(!confirm(`'${cat}' 항목을 삭제할까요?`))return;
  saveCats(getCats().filter(c=>c!==cat));render();
}

// ── 공유 코드 설정 ───────────────────────────────────────────
function setRoom(){
  const code=(document.getElementById('roomCodeInput').value||'').trim();
  if(code.length<3){alert('3자 이상 입력해주세요');return;}
  localStorage.setItem('gagebu_room',code);
  ROOM=code;
  document.getElementById('roomSetup').style.display='none';
  initFirebase();
  render();
}

// ── 시작 ────────────────────────────────────────────────────
if(!ROOM){
  render();
  document.getElementById('roomSetup').style.display='flex';
}else{
  initFirebase();
  render();
}
</script>

<div id="roomSetup" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--bg);border-radius:16px;padding:24px;width:100%;max-width:360px">
    <div style="font-size:28px;margin-bottom:8px">📒</div>
    <h2 style="font-size:18px;font-weight:700;margin-bottom:8px">공유 코드 설정</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.7">두 사람이 <b>같은 코드</b>를 입력하면<br>실시간으로 같은 데이터를 공유해요.<br>아무 단어나 괜찮아요!</p>
    <input type="text" id="roomCodeInput" placeholder="예: knky2026" maxlength="20"
      style="width:100%;padding:13px;border:1.5px solid var(--border2);border-radius:10px;font-size:16px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;margin-bottom:12px;text-align:center;letter-spacing:2px">
    <button onclick="setRoom()" style="width:100%;padding:14px;background:var(--accent);color:var(--bg);border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit">완료</button>
    <p style="font-size:11px;color:var(--text3);text-align:center;margin-top:12px">가영이도 똑같은 코드 입력하면 돼요</p>
  </div>
</div>
</body>
</html>
