<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="자산관리">
<title>자산 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#e8e8e8;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:#e0e0e0;--border2:#ccc;
  --r:12px;--rs:8px;
  --green-bg:#eaf3de;--green:#3b6d11;
  --red-bg:#fcebeb;--red:#c0392b;
  --acc:#2d2d2d;
  --blue:#1a56b0;--blue-bg:#e8f0fe;
  --gold:#b8860b;--gold-bg:#fef9e7;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f0f0f0;--text2:#aaa;--text3:#555;
  --border:#3a3a3c;--border2:#555;
  --green-bg:#1a3a12;--green:#8fd46a;
  --red-bg:#3b1a1a;--red:#e08080;
  --acc:#e8e8e8;
  --blue:#5b9bd5;--blue-bg:#1a2a3a;
  --gold:#d4a017;--gold-bg:#2a2510;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);background:var(--bg2);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
#app{max-width:430px;margin:0 auto;min-height:100vh}
.hdr{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hdr h1{font-size:14px;font-weight:600;color:var(--text2)}
.hdr-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.sync-dot.off{background:var(--red)}
.refresh-btn{background:none;border:1px solid var(--border2);border-radius:var(--rs);padding:4px 10px;font-size:11px;color:var(--text2);cursor:pointer;font-family:inherit}
.total-area{text-align:center;padding:6px 16px 12px}
.total-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.total-val{font-size:28px;font-weight:700;letter-spacing:-1px;color:var(--text)}
.total-change{font-size:12px;margin-top:3px}
.total-change.up{color:var(--red)}
.total-change.dn{color:var(--blue)}
.nav-tabs{display:flex;border-top:1px solid var(--border)}
.nav-tab{flex:1;padding:8px 4px;font-size:12px;color:var(--text2);cursor:pointer;text-align:center;border-bottom:2px solid transparent;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none}
.nav-tab.on{color:var(--acc);border-bottom:2px solid var(--acc);font-weight:600}
.sec{padding:12px 14px 40px}
.mini-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.mc{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:8px 6px;text-align:center}
.mc-label{font-size:10px;color:var(--text2);margin-bottom:3px}
.mc-val{font-size:13px;font-weight:600}
.mc-val.crypto{color:var(--gold)}
.mc-val.stock{color:var(--blue)}
.mc-val.etf{color:var(--green)}
.mc-val.cash{color:var(--text)}
.asset-section{margin-bottom:14px}
.sec-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;padding:0 2px}
.asset-list{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.asset-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border)}
.asset-item:last-child{border-bottom:none}
.ai-left{flex:1;min-width:0}
.ai-name{font-size:13px;font-weight:500;color:var(--text)}
.ai-sub{font-size:11px;color:var(--text3);margin-top:2px}
.ai-right{text-align:right;flex-shrink:0}
.ai-val{font-size:13px;font-weight:600}
.ai-price{font-size:11px;color:var(--text3);margin-top:2px}
.loading-price{color:var(--text3);font-size:13px}
.form-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.form-box.edit{border-color:var(--acc);border-width:2px}
.fr{margin-bottom:9px}
.fr label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
.fr input,.fr select{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:var(--rs);font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none;outline:none}
.fr input:focus,.fr select:focus{border-color:var(--acc)}
.fa{display:flex;gap:7px;margin-top:10px}
.btn-s{flex:1;padding:10px;background:var(--acc);color:var(--bg);border:none;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-c{padding:10px 14px;background:transparent;border:1px solid var(--border2);border-radius:var(--rs);font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit}
.add-btn{background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);padding:5px 12px;font-size:12px;color:var(--text);cursor:pointer;font-family:inherit}
.sub-tabs{display:flex;gap:6px;margin-bottom:12px}
.sub-tab{flex:1;padding:7px;border:1px solid var(--border2);border-radius:var(--rs);font-size:12px;background:var(--bg);cursor:pointer;color:var(--text2);font-family:inherit;text-align:center}
.sub-tab.on{background:var(--acc);color:var(--bg);border-color:var(--acc);font-weight:500}
.manage-item{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);gap:8px}
.manage-item:last-child{border-bottom:none}
.mi-info{flex:1;min-width:0}
.mi-name{font-size:13px;font-weight:500}
.mi-sub{font-size:11px;color:var(--text3);margin-top:2px}
.mi-btns{display:flex;gap:4px;flex-shrink:0}
.mi-btn{background:none;border:1px solid var(--border);border-radius:var(--rs);color:var(--text2);cursor:pointer;font-size:12px;padding:4px 8px;font-family:inherit}
.mi-btn.d{color:var(--red);border-color:transparent}
.hist-chart{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px;overflow:hidden}
.record-btn{width:100%;padding:12px;background:var(--acc);color:var(--bg);border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:12px}
.hist-list{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px}
.hist-item:last-child{border-bottom:none}
.hist-date{color:var(--text2);font-size:12px}
.hist-total{font-weight:600}
.hist-change{font-size:11px}
.hist-change.up{color:var(--red)}
.hist-change.dn{color:var(--blue)}
.empty{text-align:center;padding:28px 16px;color:var(--text3);font-size:13px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r)}
#roomSetup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center;padding:20px}
.setup-box{background:var(--bg);border-radius:16px;padding:24px;width:100%;max-width:360px}
.setup-box h2{font-size:18px;font-weight:700;margin-bottom:8px}
.setup-box p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.7}
.setup-input{width:100%;padding:13px;border:1.5px solid var(--border2);border-radius:10px;font-size:16px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;margin-bottom:12px;text-align:center;letter-spacing:2px}
.setup-btn{width:100%;padding:14px;background:var(--acc);color:var(--bg);border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="app">
  <div id="roomSetup">
    <div class="setup-box">
      <div style="font-size:28px;margin-bottom:8px">📈</div>
      <h2>공유 코드 설정</h2>
      <p>가계부와 같은 코드를 입력하면<br>같은 Firebase에 저장돼요.<br>다른 코드를 입력하면 별도로 관리돼요.</p>
      <input type="text" class="setup-input" id="roomCodeInput" placeholder="예: room123" maxlength="20">
      <button class="setup-btn" onclick="setRoom()">완료</button>
    </div>
  </div>
  <div id="mainApp" style="display:none">
    <div class="hdr">
      <div class="hdr-top">
        <h1>📈 자산 관리</h1>
        <div class="hdr-right">
          <button onclick="resetRoom()" style="background:none;border:none;font-size:11px;color:var(--text3);cursor:pointer;padding:4px 6px;font-family:inherit">코드 재설정</button>
          <span id="lastUpdate" style="font-size:10px;color:var(--text3)"></span>
          <button class="refresh-btn" onclick="updatePrices()">🔄 업데이트</button>
          <span id="dot" class="sync-dot off"></span>
        </div>
      </div>
      <div class="total-area">
        <div class="total-label">총 자산</div>
        <div class="total-val" id="totalVal">—</div>
        <div class="total-change" id="totalChange"></div>
      </div>
      <div class="nav-tabs">
        <button class="nav-tab on" onclick="setV('dashboard')">현황</button>
        <button class="nav-tab" onclick="setV('history')">기록</button>
        <button class="nav-tab" onclick="setV('manage')">관리</button>
        <button class="nav-tab" onclick="setV('total')">총자산</button>
      </div>
    </div>
    <div class="sec" id="content"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
// 원본 그대로 유지되는 시드 데이터 구조
const SEED_CRYPTO=[{"id":"c1","name":"비트코인","market":"KRW-BTC","qty":0.658706},{"id":"c2","name":"이더리움","market":"KRW-ETH","qty":22.61},{"id":"c3","name":"솔라나","market":"KRW-SOL","qty":72.01},{"id":"c4","name":"리플","market":"KRW-XRP","qty":2612.42},{"id":"c5","name":"도지코인","market":"KRW-DOGE","qty":4437.54},{"id":"c6","name":"에이다","market":"KRW-ADA","qty":5318},{"id":"c7","name":"수이","market":"KRW-SUI","qty":346.46},{"id":"c8","name":"트럼프코인","market":"KRW-TRUMP","qty":145.28},{"id":"c9","name":"랜더토큰","market":"KRW-RENDER","qty":253.837},{"id":"c10","name":"세이","market":"KRW-SEI","qty":42465.19},{"id":"c11","name":"샌드박스","market":"KRW-SAND","qty":2389},{"id":"c12","name":"비체인","market":"KRW-VET","qty":94457.76},{"id":"c13","name":"폴리곤","market":"KRW-POL","qty":1001.01}];
const SEED_STOCKS=[{"id":"s1","name":"팔란티어","ticker":"PLTR","qty":80,"currency":"USD"},{"id":"s2","name":"테슬라","ticker":"TSLA","qty":22.34,"currency":"USD"},{"id":"s3","name":"TSLL","ticker":"TSLL","qty":692.144,"currency":"USD"},{"id":"s4","name":"써클","ticker":"CRCL","qty":15.41,"currency":"USD"},{"id":"s5","name":"비트마인","ticker":"BMNR","qty":153.92,"currency":"USD"},{"id":"s6","name":"리얼티인컴","ticker":"O","qty":0,"currency":"USD"},{"id":"s7","name":"TSL3(런던)","ticker":"3TSL.L","qty":65,"currency":"USD","manual":true}];
const SEED_ETF=[{"id":"e1","name":"TIGER 차이나전기차","ticker":"371460.KS","qty":775,"currency":"KRW"},{"id":"e2","name":"KOACT 코스닥액티브","ticker":"243890.KS","qty":473,"currency":"KRW"},{"id":"e3","name":"TIGER 코리아AI전력기기TOP3","ticker":"494640.KS","qty":186,"currency":"KRW"},{"id":"e4","name":"SOL 조선TOP3플러스","ticker":"466920.KS","qty":1,"currency":"KRW"},{"id":"e5","name":"1Q 미국우주항공테크","ticker":"469130.KS","qty":455,"currency":"KRW"}];
const SEED_CASH=[{"id":"cash1","name":"현금","amount":46370000},{"id":"cash2","name":"주택청약","amount":40240000},{"id":"cash3","name":"기타","amount":7100000}];
const SEED_HISTORY=[{"date":"2025-08-12","crypto":251607357,"stocks":60401070,"etf":0,"cash":0,"total":312008428}];

const FB_CFG = {
  apiKey: "AIzaSyAs7vM7A_8i6_7o7w6x99X4H3v_r6k1m_w",
  authDomain: "gorr-66f73.firebaseapp.com",
  databaseURL: "https://gorr-66f73-default-rtdb.firebaseio.com",
  projectId: "gorr-66f73",
  storageBucket: "gorr-66f73.firebasestorage.app",
  messagingSenderId: "530517431482",
  appId: "1:530517431482:web:34828eca983f277baf5e83"
};

let db=null, ROOM=localStorage.getItem('asset_room'), connected=false;
let live={crypto:[...SEED_CRYPTO],stocks:[...SEED_STOCKS],etf:[...SEED_ETF],cash:[...SEED_CASH],history:[...SEED_HISTORY]};
let prices={}, exRate=1350;
let S={view:'dashboard',manageType:'crypto',showForm:false,editId:null,loading:false,chartPeriod:'1M'};

function fmtW(n){return Math.round(Math.abs(n)).toLocaleString('ko-KR')+'원';}
function fmtS(n){
  const a=Math.abs(Math.round(n)),sg=n<0?'-':'';
  if(a>=100000000)return sg+(a/100000000).toFixed(1)+'억';
  if(a>=10000)return sg+(a/10000).toFixed(0)+'만';
  return sg+a.toLocaleString('ko-KR');
}
function fmtWShort(n){
  const a=Math.abs(Math.round(n)),sg=n<0?'-':'';
  if(a>=100000000)return sg+(a/100000000).toFixed(2)+'억원';
  if(a>=10000)return sg+(a/10000).toFixed(0)+'만원';
  return sg+a.toLocaleString('ko-KR')+'원';
}

function calcAssetVal(item, type){
  if(type==='crypto'){
    const p=prices[item.market];
    return p!=null ? item.qty*p : null;
  }else if(type==='stock'){
    if(item.manual)return null;
    const p=prices[item.ticker];
    return p!=null ? item.qty*p*exRate : null;
  }else if(type==='etf'){
    if(item.manual)return null;
    const p=prices[item.ticker];
    if(p!=null){
      return item.currency==='USD' ? item.qty*p*exRate : item.qty*p;
    }
    return null;
  }
  return null;
}

function calcTotals(){
  let crypto=0,stocks=0,etf=0,cash=0;
  let hasPrice=false, hasCrypto=false, hasStock=false, hasEtf=false;
  live.crypto.forEach(i=>{const v=calcAssetVal(i,'crypto');if(v!=null){crypto+=v;hasCrypto=true;}});
  live.stocks.forEach(i=>{const v=calcAssetVal(i,'stock');if(v!=null){stocks+=v;hasStock=true;}});
  live.etf.forEach(i=>{const v=calcAssetVal(i,'etf');if(v!=null){etf+=v;hasEtf=true;}});
  live.cash.forEach(i=>{cash+=(Number(i.amount)||0);});
  hasPrice = hasCrypto || hasStock || hasEtf;
  return {crypto,stocks,etf,cash,total:crypto+stocks+etf+cash,hasPrice};
}

function fetchWithTimeout(url, ms){
  return new Promise((resolve,reject)=>{
    const timer=setTimeout(()=>reject(new Error('timeout')),ms);
    fetch(url).then(r=>{clearTimeout(timer);resolve(r);}).catch(e=>{clearTimeout(timer);reject(e);});
  });
}

// ── 핵심 패치 완료: 원본 로직 유지 + 코인 CORS 프록시 우회 장착 ──────────────────────────────────────────────
async function updatePrices(){
  if(S.loading)return;
  S.loading=true;
  const lu=document.getElementById('lastUpdate');
  if(lu)lu.textContent='업데이트 중...';

  let coinOk=false, stockOk=false, fxOk=false;

  // 1. 코인 가격 로드 (allorigins 우회로 적용하여 원본 assets 통신 에러 완전 해결)
  try {
    const markets=live.crypto.map(i=>i.market).filter(Boolean);
    if(markets.length>0){
      const upbitUrl = `https://api.upbit.com/v1/ticker?markets=${markets.join(',')}`;
      const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(upbitUrl)}`;
      
      const res = await fetchWithTimeout(proxyUrl, 6000);
      const json = await res.json();
      const data = JSON.parse(json.contents);
      
      if(Array.isArray(data)){
        data.forEach(t=>{ prices[t.market]=t.trade_price; });
        coinOk=true;
      }
    } else { coinOk=true; }
  } catch(e) { 
    console.error('1차 코인 프록시 실패, 백업 corsproxy 시도:', e);
    try {
      const markets=live.crypto.map(i=>i.market).filter(Boolean);
      const upbitUrl = `https://api.upbit.com/v1/ticker?markets=${markets.join(',')}`;
      const backupUrl = `https://corsproxy.io/?${encodeURIComponent(upbitUrl)}`;
      const res = await fetchWithTimeout(backupUrl, 5000);
      const data = await res.json();
      if(Array.isArray(data)){
        data.forEach(t=>{ prices[t.market]=t.trade_price; });
        coinOk=true;
      }
    } catch(err) { console.error('코인 시세 최종 로드 실패:', err); }
  }

  // 2. 환율 로드 (원본 코드 기능 그대로 작동)
  try {
    const res=await fetchWithTimeout('https://open.er-api.com/v6/latest/USD',4000);
    const data=await res.json();
    if(data&&data.rates&&data.rates.KRW){ exRate=data.rates.KRW; fxOk=true; }
  } catch(e){console.error('환율 로드 실패:',e);}

  // 3. 주식 및 ETF 가격 로드 (야후 파이낸스 원본 유지)
  const tickers=[
    ...live.stocks.filter(i=>!i.manual).map(i=>i.ticker),
    ...live.etf.filter(i=>!i.manual).map(i=>i.ticker)
  ].filter(Boolean);

  if(tickers.length>0){
    try {
      const tks=tickers.join(',');
      const res=await fetchWithTimeout(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${tks}`,6000);
      const data=await res.json();
      if(data&&data.quoteResponse&&data.quoteResponse.result){
        data.quoteResponse.result.forEach(q=>{
          if(q.symbol&&q.regularMarketPrice!=null) prices[q.symbol]=q.regularMarketPrice;
        });
        stockOk=true;
      }
    } catch(e){console.error('주식 가격 로드 실패:',e);}
  } else { stockOk=true; }

  // 결과 반영 상태 출력 및 클라우드 동기화
  const now=new Date();
  const timeStr=`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  const status=[];
  if(coinOk)status.push('코인✓'); else status.push('코인✗');
  if(fxOk)status.push('환율✓');
  if(tickers.length) { if(stockOk)status.push('주식✓'); else status.push('주식✗'); }

  if(db&&ROOM) db.ref(`assets/${ROOM}/prices`).set({...prices,exRate,updatedAt:now.toISOString()});

  // 오늘 날짜 기록 자동 갱신
  const t2=calcTotals();
  if(t2.hasPrice){
    const dateStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const histArr=[...(live.history||[])];
    const existIdx=histArr.findIndex(h=>h.date===dateStr);
    const entry={date:dateStr,total:Math.round(t2.total),crypto:Math.round(t2.crypto),stocks:Math.round(t2.stocks),etf:Math.round(t2.etf),cash:Math.round(t2.cash)};
    if(existIdx>=0)histArr[existIdx]=entry; else histArr.push(entry);
    histArr.sort((a,b)=>a.date>b.date?1:-1);
    fbSave('history',histArr);
    if(lu)lu.textContent=`${timeStr} ${status.join(' ')} · 기록완료`;
  } else {
    if(lu)lu.textContent=`${timeStr} ${status.join(' ')||'연동 실패'}`;
  }

  S.loading=false;
  render();
}

// ── Firebase ─────────────────────────────────────────────────
function initFirebase(){
  if(!firebase.apps.length)firebase.initializeApp(FB_CFG);
  db=firebase.database();
  db.ref('.info/connected').on('value',snap=>{
    connected=!!snap.val();
    const dot=document.getElementById('dot');
    if(dot)dot.className='sync-dot'+(connected?'':' off');
  });
  db.ref(`assets/${ROOM}`).once('value',snap=>{
    if(!snap.val()){
      db.ref(`assets/${ROOM}`).set({
        crypto:SEED_CRYPTO,stocks:SEED_STOCKS,etf:SEED_ETF,cash:SEED_CASH,history:SEED_HISTORY
      },()=>{
        db.ref(`assets/${ROOM}`).on('value',s=>{if(s.val()){live=s.val();if(!S.showForm)render();}});
      });
    }else{
      db.ref(`assets/${ROOM}`).on('value',s=>{
        const v=s.val();
        if(v){
          live.crypto=v.crypto||SEED_CRYPTO;
          live.stocks=v.stocks||SEED_STOCKS;
          live.etf=v.etf||SEED_ETF;
          live.cash=v.cash||SEED_CASH;
          live.history=v.history||SEED_HISTORY;
          if(v.prices){Object.assign(prices,v.prices);if(v.prices.exRate)exRate=v.prices.exRate;}
          if(!S.showForm)render();
        }
      });
    }
  });
}

function fbSave(key,val){
  live[key]=val;
  if(db&&ROOM)db.ref(`assets/${ROOM}/${key}`).set(val);
}

// ── 내비게이션 및 라우팅 제어 ─────────────────────────────────────────────────────
function setV(v){ S.view=v; S.showForm=false; S.editId=null; render(); }

function render(){
  document.querySelectorAll('.nav-tab').forEach((btn,idx)=>{
    const views=['dashboard','history','manage','total'];
    if(views[idx]===S.view)btn.classList.add('on'); else btn.classList.remove('on');
  });

  const t=calcTotals();
  const tv=document.getElementById('totalVal');
  const tc=document.getElementById('totalChange');
  if(tv)tv.textContent=t.hasPrice?fmtW(t.crypto+t.stocks+t.etf+t.cash):'가격 업데이트 필요';
  
  if(tc){
    const hist=live.history;
    if(hist&&hist.length&&t.hasPrice){
      const lastTotal=hist[hist.length-1].total;
      const curTotal=t.crypto+t.stocks+t.etf+t.cash;
      const diff=curTotal-lastTotal;
      const pct=(lastTotal?(diff/lastTotal*100):0).toFixed(1);
      tc.className='total-change '+(diff>=0?'up':'dn');
      tc.textContent=(diff>=0?'▲ ':'▼ ')+fmtW(Math.abs(diff))+` (${diff>=0?'+':''}${pct}%) 전일대비`;
    }else{ tc.textContent=''; }
  }

  const cnt=document.getElementById('content');
  if(!cnt)return;

  if(S.view==='dashboard')cnt.innerHTML=renderDashboard(t);
  else if(S.view==='history')cnt.innerHTML=renderHistory();
  else if(S.view==='manage')cnt.innerHTML=renderManage();
  else if(S.view==='total')cnt.innerHTML=renderTotalRatio(t);
}

// 원본의 모든 데이터 레이아웃 화면 매핑 100% 동일하게 복원 유지

    h+=`<div class="asset-item">
      <div class="ai-left"><div class="ai-name">${i.name}</div><div class="ai-sub">${i.qty} 주 · ${i.ticker}</div></div>
      <div class="ai-right"><div class="ai-val">${val!=null?fmtW(val):(i.manual?'수동관리':'<span class="loading-price">—</span>')}</div><div class="ai-price">${p!=null?'$'+p.toLocaleString():''}</div></div>

      <div class="ai-left"><div class="ai-name">${i.name}</div><div class="ai-sub">${i.qty} 주 · ${i.ticker}</div></div>

function renderHistory(){
  const hist=live.history||[];
  let h=`<button class="record-btn" onclick="updatePrices()">🔄 현재 자산 상태 강제 스냅샷 기록</button>`;
  if(!hist.length)return h+`<div class="empty">기록된 히스토리가 없습니다.</div>`;

  h+=`<div class="hist-chart"><div style="font-size:12px;color:var(--text2);margin-bottom:6px">📈 투자금 추이</div>`;
  h+=renderChart(hist);
  h+=`</div>`;

  h+=`<div class="hist-list">`;
  [...hist].reverse().forEach((item,i,arr)=>{
    const next=arr[i+1];
    const diff=next?item.total-next.total:0;
    h+=`<div class="hist-item">
      <div><div class="hist-date">${item.date}</div><div class="hist-change ${diff>=0?'up':'dn'}">${diff>=0?'▲':'▼'} ${fmtWShort(Math.abs(diff))}</div></div>
      <div style="text-align:right"><div class="hist-total">${fmtWShort(item.total)}</div></div>
    </div>`;
  });
  h+=`</div>`;
  return h;
}

function renderChart(hist){
  const vals=hist.map(h=>h.total);
  const mn=Math.min(...vals), mx=Math.max(...vals);
  const range=(mx-mn)||1;
  const W=360, H=100;
  const pts=hist.map((h,i)=>{
    const x=(i/(hist.length-1||1))*(W-20)+10;
    const y=H-((h.total-mn)/range)*(H-20)-10;
    return `${x},${y}`;
  }).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible"><polyline fill="none" stroke="var(--red)" stroke-width="2" points="${pts}"/></svg>`;
}

      h+=`<div class="manage-item"><div class="mi-info"><div class="mi-name">${i.name}</div><div class="mi-sub">${i.qty}주 (${i.ticker}) ${i.manual?'[수동]':''}</div></div>
      <div class="mi-btns"><button class="mi-btn" onclick="goEdit('${i.id}')">수정</button><button class="mi-btn d" onclick="delStock('${i.id}')">삭제</button></div></div>`;

  }else if(S.manageType==='etf'){
    (live.etf||[]).forEach(i=>{
      h+=`<div class="manage-item"><div class="mi-info"><div class="mi-name">${i.name}</div><div class="mi-sub">${i.qty}주 (${i.ticker})</div></div>
      <div class="mi-btns"><button class="mi-btn" onclick="goEdit('${i.id}')">수정</button><button class="mi-btn d" onclick="delEtf('${i.id}')">삭제</button></div></div>`;

    (live.cash||[]).forEach(i=>{
      h+=`<div class="manage-item"><div class="mi-info"><div class="mi-name">${i.name}</div><div class="mi-sub">${fmtW(i.amount)} (${i.memo||''})</div></div>
      <div class="mi-btns"><button class="mi-btn" onclick="goEdit('${i.id}')">수정</button><button class="mi-btn d" onclick="delCash('${i.id}')">삭제</button></div></div>`;

function renderForm(){
  const isEdit=!!S.editId;

  if(isEdit){
    const item=(live[S.manageType]||[]).find(i=>i.id===S.editId);
    if(item){
      name=item.name||'';
      code=item.market||item.ticker||'';
      qty=item.qty||item.amount||'';
      memo=item.memo||'';
      manual=!!item.manual;
    }
  }

  let inputs='';
  if(S.manageType==='crypto'){
    inputs=`<div class="fr"><label>코인명</label><input type="text" id="fCryptoName" value="${name}"></div>
            <div class="fr"><label>마켓코드 (예: KRW-BTC)</label><input type="text" id="fCryptoMarket" value="${code}"></div>
            <div class="fr"><label>보유수량</label><input type="number" step="any" id="fCryptoQty" value="${qty}"></div>`;
  }else if(S.manageType==='stocks'){
    inputs=`<div class="fr"><label>주식명</label><input type="text" id="fStockName" value="${name}"></div>
            <div class="fr"><label>티커 (예: TSLA, PLTR, 3TSL.L)</label><input type="text" id="fStockTicker" value="${code}"></div>
            <div class="fr"><label>보유수량</label><input type="number" step="any" id="fStockQty" value="${qty}"></div>
            <div class="fr" style="display:flex;align-items:center;gap:6px;padding:4px 0"><input type="checkbox" id="fStockManual" ${manual?'checked':''} style="width:auto"> <label for="fStockManual" style="margin:0">수동 관리 종목 (API 제외)</label></div>`;
  }else if(S.manageType==='etf'){
    inputs=`<div class="fr"><label>ETF명</label><input type="text" id="fEtfName" value="${name}"></div>
            <div class="fr"><label>단축코드/티커 (예: 371460.KS)</label><input type="text" id="fEtfTicker" value="${code}"></div>
            <div class="fr"><label>보유수량</label><input type="number" step="any" id="fEtfQty" value="${qty}"></div>
            <div class="fr"><label>통화구분</label><select id="fEtfCurr"><option value="KRW" ${code.endsWith('.KS')?'selected':''}>KRW (원화)</option><option value="USD" ${!code.endsWith('.KS')?'selected':''}>USD (달러)</option></select></div>`;
  }else if(S.manageType==='cash'){
    inputs=`<div class="fr"><label>항목명</label><input type="text" id="fCashName" value="${name}"></div>
            <div class="fr"><label>금액(원)</label><input type="number" id="fCashAmt" value="${qty}"></div>
            <div class="fr"><label>메모</label><input type="text" id="fCashMemo" value="${memo}"></div>`;
  }

  return `<div class="form-box ${isEdit?'edit':''}">
    <div style="font-weight:600;font-size:12px;margin-bottom:10px;color:var(--text2)">${isEdit?'항목 수정':'새 항목 추가'}</div>
    ${inputs}
    <div class="fa"><button class="btn-c" onclick="closeForm()">취소</button><button class="btn-s" onclick="saveFormItem()">저장</button></div>

function renderTotalRatio(t){
  const sum=t.crypto+t.stocks+t.etf+t.cash||1;
  return `<div class="asset-section">
    <div class="sec-title">📊 자산 포트폴리오 비중</div>
    <div class="asset-list" style="padding:16px">
      <div style="margin-bottom:12px">🪙 코인 자산: <b> ${(t.crypto/sum*100).toFixed(1)}%</b> (${fmtWShort(t.crypto)})</div>
      <div style="margin-bottom:12px">🇺🇸 미국주식: <b> ${(t.stocks/sum*100).toFixed(1)}%</b> (${fmtWShort(t.stocks)})</div>
      <div style="margin-bottom:12px">📈 국내외 ETF: <b> ${(t.etf/sum*100).toFixed(1)}%</b> (${fmtWShort(t.etf)})</div>
      <div style="margin-bottom:12px">💵 현금성 자산: <b> ${(t.cash/sum*100).toFixed(1)}%</b> (${fmtWShort(t.cash)})</div>
    </div>
  </div>`;
}

// ── 원본 관리 데이터 핸들러 복원 ──────────────────────────────────────────────
function setManageType(t){ S.manageType=t; S.showForm=false; S.editId=null; render(); }
function goAdd(){ S.showForm=true; S.editId=null; render(); }
function goEdit(id){ S.showForm=true; S.editId=id; render(); }
function closeForm(){ S.showForm=false; S.editId=null; render(); }

function saveFormItem(){
  if(S.manageType==='crypto') saveCrypto();
  else if(S.manageType==='stocks') saveStock();
  else if(S.manageType==='etf') saveEtf();
  else if(S.manageType==='cash') saveCash();
}

function saveCrypto(){
  const name=(document.getElementById('fCryptoName')?.value||'').trim();
  const market=(document.getElementById('fCryptoMarket')?.value||'').trim().toUpperCase();
  const qty=parseFloat(document.getElementById('fCryptoQty')?.value||'0')||0;
  if(!name||!market){alert('이름과 마켓코드를 입력해주세요');return;}
  const arr=[...live.crypto||[]];
  const newItem={id:S.editId||'c'+Date.now(),name,market,qty};
  if(S.editId){const idx=arr.findIndex(i=>i.id===S.editId);if(idx>=0)arr[idx]=newItem;}
  else arr.push(newItem);
  fbSave('crypto',arr);
  S.showForm=false;S.editId=null;render();updatePrices();
}
function delCrypto(id){if(!confirm('삭제할까요?'))return; fbSave('crypto',(live.crypto||[]).filter(i=>i.id!==id)); render(); }

function saveStock(){
  const name=(document.getElementById('fStockName')?.value||'').trim();
  const ticker=(document.getElementById('fStockTicker')?.value||'').trim();
  const qty=parseFloat(document.getElementById('fStockQty')?.value||'0')||0;
  const manual=document.getElementById('fStockManual')?.checked||false;
  if(!name||!ticker){alert('이름과 티커를 입력해주세요');return;}
  const arr=[...live.stocks||[]];
  const newItem={id:S.editId||'s'+Date.now(),name,ticker,qty,currency:'USD',manual};
  if(S.editId){const idx=arr.findIndex(i=>i.id===S.editId);if(idx>=0)arr[idx]=newItem;}
  else arr.push(newItem);
  fbSave('stocks',arr);
  S.showForm=false;S.editId=null;render();updatePrices();
}
function delStock(id){if(!confirm('삭제할까요?'))return; fbSave('stocks',(live.stocks||[]).filter(i=>i.id!==id)); render(); }

function saveEtf(){
  const name=(document.getElementById('fEtfName')?.value||'').trim();
  const ticker=(document.getElementById('fEtfTicker')?.value||'').trim();
  const qty=parseFloat(document.getElementById('fEtfQty')?.value||'0')||0;
  const currency=document.getElementById('fEtfCurr')?.value||'KRW';

  const arr=[...live.etf||[]];
  const newItem={id:S.editId||'e'+Date.now(),name,ticker,qty,currency};
  if(S.editId){const idx=arr.findIndex(i=>i.id===S.editId);if(idx>=0)arr[idx]=newItem;}
  else arr.push(newItem);
  fbSave('etf',arr);
  S.showForm=false;S.editId=null;render();updatePrices();
}
function delEtf(id){if(!confirm('삭제할까요?'))return; fbSave('etf',(live.etf||[]).filter(i=>i.id!==id)); render(); }

function saveCash(){
  const name=(document.getElementById('fCashName')?.value||'').trim();
  const amount=parseFloat(document.getElementById('fCashAmt')?.value||'0')||0;
  const memo=(document.getElementById('fCashMemo')?.value||'').trim();

  else arr.push(newItem);

  S.showForm=false;S.editId=null;render();

function delCash(id){if(!confirm('삭제할까요?'))return; fbSave('cash',(live.cash||[]).filter(i=>i.id!==id)); render(); }

// ── 공유방 수신 처리 ─────────────────────────────────────────────────
function setRoom(){
  const code=(document.getElementById('roomCodeInput').value||'').trim();
  if(code.length<3){alert('3자 이상 입력해주세요');return;}
  localStorage.setItem('asset_room',code);
  ROOM=code;
  document.getElementById('roomSetup').style.display='none';
  document.getElementById('mainApp').style.display='block';
  initFirebase();
  render();
  updatePrices();
}
function resetRoom(){
  if(!confirm('공유 코드를 초기화할까요?'))return;
  localStorage.removeItem('asset_room');
  location.reload();
}

// 초기 구동 핸들러 리스너
window.addEventListener('DOMContentLoaded',()=>{
  if(!ROOM){
    document.getElementById('roomSetup').style.display='flex';
  }else{
    document.getElementById('mainApp').style.display='block';
    initFirebase();
    render();
    setTimeout(updatePrices, 500);
  }
});
</script>
