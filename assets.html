<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="자산관리">
<title>자산 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#e8e8e8;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:#e0e0e0;--border2:#ccc;
  --r:12px;--rs:8px;
  --green-bg:#eaf3de;--green:#3b6d11;
  --red-bg:#fcebeb;--red:#c0392b;
  --acc:#2d2d2d;
  --blue:#1a56b0;--blue-bg:#e8f0fe;
  --gold:#b8860b;--gold-bg:#fef9e7;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f0f0f0;--text2:#aaa;--text3:#555;
  --border:#3a3a3c;--border2:#555;
  --green-bg:#1a3a12;--green:#8fd46a;
  --red-bg:#3b1a1a;--red:#e08080;
  --acc:#e8e8e8;
  --blue:#5b9bd5;--blue-bg:#1a2a3a;
  --gold:#d4a017;--gold-bg:#2a2510;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);background:var(--bg2);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
#app{max-width:430px;margin:0 auto;min-height:100vh}
.hdr{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hdr h1{font-size:14px;font-weight:600;color:var(--text2)}
.hdr-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.sync-dot.off{background:var(--red)}
.refresh-btn{background:none;border:1px solid var(--border2);border-radius:var(--rs);padding:4px 10px;font-size:11px;color:var(--text2);cursor:pointer;font-family:inherit}
.total-area{text-align:center;padding:6px 16px 12px}
.total-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.total-val{font-size:28px;font-weight:700;letter-spacing:-1px;color:var(--text)}
.total-change{font-size:12px;margin-top:3px}
.total-change.up{color:var(--red)}
.total-change.dn{color:var(--blue)}
.nav-tabs{display:flex;border-top:1px solid var(--border)}
.nav-tab{flex:1;padding:8px 4px;font-size:12px;color:var(--text2);cursor:pointer;text-align:center;border-bottom:2px solid transparent;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none}
.nav-tab.on{color:var(--acc);border-bottom:2px solid var(--acc);font-weight:600}
.sec{padding:12px 14px 40px}
/* cards */
.mini-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.mc{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:8px 6px;text-align:center}
.mc-label{font-size:10px;color:var(--text2);margin-bottom:3px}
.mc-val{font-size:13px;font-weight:600}
.mc-val.crypto{color:var(--gold)}
.mc-val.stock{color:var(--blue)}
.mc-val.etf{color:var(--green)}
.mc-val.cash{color:var(--text)}
/* list items */
.asset-section{margin-bottom:14px}
.sec-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;padding:0 2px}
.asset-list{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.asset-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border)}
.asset-item:last-child{border-bottom:none}
.ai-left{flex:1;min-width:0}
.ai-name{font-size:13px;font-weight:500;color:var(--text)}
.ai-sub{font-size:11px;color:var(--text3);margin-top:2px}
.ai-right{text-align:right;flex-shrink:0}
.ai-val{font-size:13px;font-weight:600}
.ai-price{font-size:11px;color:var(--text3);margin-top:2px}
.loading-price{color:var(--text3);font-size:13px}
/* form */
.form-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.form-box.edit{border-color:var(--acc);border-width:2px}
.fr{margin-bottom:9px}
.fr label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
.fr input,.fr select{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:var(--rs);font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none;outline:none}
.fr input:focus,.fr select:focus{border-color:var(--acc)}
.fa{display:flex;gap:7px;margin-top:10px}
.btn-s{flex:1;padding:10px;background:var(--acc);color:var(--bg);border:none;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-c{padding:10px 14px;background:transparent;border:1px solid var(--border2);border-radius:var(--rs);font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit}
.add-btn{background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);padding:5px 12px;font-size:12px;color:var(--text);cursor:pointer;font-family:inherit}
/* manage tabs */
.sub-tabs{display:flex;gap:6px;margin-bottom:12px}
.sub-tab{flex:1;padding:7px;border:1px solid var(--border2);border-radius:var(--rs);font-size:12px;background:var(--bg);cursor:pointer;color:var(--text2);font-family:inherit;text-align:center}
.sub-tab.on{background:var(--acc);color:var(--bg);border-color:var(--acc);font-weight:500}
/* manage items */
.manage-item{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);gap:8px}
.manage-item:last-child{border-bottom:none}
.mi-info{flex:1;min-width:0}
.mi-name{font-size:13px;font-weight:500}
.mi-sub{font-size:11px;color:var(--text3);margin-top:2px}
.mi-btns{display:flex;gap:4px;flex-shrink:0}
.mi-btn{background:none;border:1px solid var(--border);border-radius:var(--rs);color:var(--text2);cursor:pointer;font-size:12px;padding:4px 8px;font-family:inherit}
.mi-btn.d{color:var(--red);border-color:transparent}
/* history */
.hist-chart{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px;overflow:hidden}
.record-btn{width:100%;padding:12px;background:var(--acc);color:var(--bg);border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:12px}
.hist-list{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px}
.hist-item:last-child{border-bottom:none}
.hist-date{color:var(--text2);font-size:12px}
.hist-total{font-weight:600}
.hist-change{font-size:11px}
.hist-change.up{color:var(--red)}
.hist-change.dn{color:var(--blue)}
/* empty */
.empty{text-align:center;padding:28px 16px;color:var(--text3);font-size:13px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r)}
/* setup modal */
#roomSetup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center;padding:20px}
.setup-box{background:var(--bg);border-radius:16px;padding:24px;width:100%;max-width:360px}
.setup-box h2{font-size:18px;font-weight:700;margin-bottom:8px}
.setup-box p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.7}
.setup-input{width:100%;padding:13px;border:1.5px solid var(--border2);border-radius:10px;font-size:16px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;margin-bottom:12px;text-align:center;letter-spacing:2px}
.setup-btn{width:100%;padding:14px;background:var(--acc);color:var(--bg);border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="app">
  <div id="roomSetup">
    <div class="setup-box">
      <div style="font-size:28px;margin-bottom:8px">📈</div>
      <h2>공유 코드 설정</h2>
      <p>가계부와 같은 코드를 입력하면<br>같은 Firebase에 저장돼요.<br>다른 코드를 입력하면 별도로 관리돼요.</p>
      <input type="text" class="setup-input" id="roomCodeInput" placeholder="예: knky2026" maxlength="20">
      <button class="setup-btn" onclick="setRoom()">완료</button>
      <p style="font-size:11px;color:var(--text3);text-align:center;margin-top:12px">가영이도 같은 코드 입력하면 돼요</p>
    </div>
  </div>
  <div id="mainApp" style="display:none">
    <div class="hdr">
      <div class="hdr-top">
        <h1>📈 자산 관리</h1>
        <div class="hdr-right">
          <button onclick="resetRoom()" style="background:none;border:none;font-size:11px;color:var(--text3);cursor:pointer;padding:4px 6px;font-family:inherit">코드 재설정</button>
          <span id="lastUpdate" style="font-size:10px;color:var(--text3)"></span>
          <button class="refresh-btn" onclick="updatePrices()">🔄 업데이트</button>
          <span id="dot" class="sync-dot off"></span>
        </div>
      </div>
      <div class="total-area">
        <div class="total-label">총 자산</div>
        <div class="total-val" id="totalVal">—</div>
        <div class="total-change" id="totalChange"></div>
      </div>
      <div class="nav-tabs">
        <button class="nav-tab on" onclick="setV('dashboard')">현황</button>
        <button class="nav-tab" onclick="setV('history')">기록</button>
        <button class="nav-tab" onclick="setV('manage')">관리</button>
        <button class="nav-tab" onclick="setV('total')">총자산</button>
      </div>
    </div>
    <div class="sec" id="content"></div>
  </div>
</div>

// ── 포맷 ─────────────────────────────────────────────────────
function fmtW(n){return Math.round(Math.abs(n)).toLocaleString('ko-KR')+'원';}
function fmtS(n){
  const a=Math.abs(Math.round(n)),sg=n<0?'-':'';
  if(a>=100000000)return sg+(a/100000000).toFixed(1)+'억';
  if(a>=10000)return sg+(a/10000).toFixed(0)+'만';
  return sg+a.toLocaleString('ko-KR');
}
function fmtWShort(n){
  const a=Math.abs(Math.round(n)),sg=n<0?'-':'';
  if(a>=100000000)return sg+(a/100000000).toFixed(2)+'억원';
  return sg+(a/10000).toLocaleString('ko-KR', {maximumFractionDigits:0})+'만원';
}

// ── 자산 계산 핵심 ──────────────────────────────────────────
function calcTotals(){
  let cSum=0, sSum=0, eSum=0, cashSum=0;
  let hasPrice=false;

  (live.crypto||[]).forEach(i=>{
    const p=prices[i.market];
    if(p!==undefined){ cSum+=i.qty*p; hasPrice=true; }
  });
  (live.stocks||[]).forEach(i=>{
    const p=prices[i.ticker];
    if(p!==undefined){
      const val=i.qty*p;
      if(i.currency==='USD') sSum+=val*exRate;
      else sSum+=val;
      hasPrice=true;
    }
  });
  (live.etf||[]).forEach(i=>{
    const p=prices[i.ticker];
    if(p!==undefined){ eSum+=i.qty*p; hasPrice=true; }
  });
  (live.cash||[]).forEach(i=>{ cashSum+=i.amount; });

  return { crypto:cSum, stocks:sSum, etf:eSum, cash:cashSum, total:cSum+sSum+eSum+cashSum, hasPrice };
}

function setV(v){

// ── 시세 실시간 가져오기 ─────────────────────────────────────────
async function updatePrices(){
  if(S.loading) return;
  S.loading=true;
  const lu=document.getElementById('lastUpdate');
  if(lu) lu.textContent='불러오는 중...';

  let coinOk=false, fxOk=false, stockOk=false;

  // 1. 코인 가격 조회 (Upbit API)
  const coins=live.crypto||[];
  if(coins.length){
    try{
      const markets=coins.map(c=>c.market).join(',');
      const res=await fetch(`https://api.upbit.com/v1/ticker?markets=${markets}`);
      const arr=await res.json();
      arr.forEach(t=>{ prices[t.market]=t.trade_price; });
      coinOk=true;
    }catch(e){console.error('Coin fetch failed:',e);}
  }else{coinOk=true;}

  // 2. 환율 가격 조회
  try{
    const res=await fetch('https://open.er-api.com/v6/latest/USD');
    const data=await res.json();
    if(data&&data.rates&&data.rates.KRW){
      exRate=data.rates.KRW;
      fxOk=true;
    }
  }catch(e){console.error('FX fetch failed:',e);}

  // 3. 국내/해외 주식 및 ETF 가격 조회
  const allTickers=[];
  (live.stocks||[]).forEach(s=>{ if(!s.manual) allTickers.push(s.ticker); });
  (live.etf||[]).forEach(e=>{ allTickers.push(e.ticker); });

  if(allTickers.length){
    try{
      const query=encodeURIComponent(`select * from yahoo.finance.quotes where symbol in (${allTickers.map(t=>`"${t}"`).join(',')})`);
      const url=`https://query.yahooapis.com/v1/public/yql?q=${query}&format=json&env=store%3A%2F%2Fdatatables.org%2Falltableswithkeys`;
      const res=await fetch(url);
      const data=await res.json();
      if(data&&data.query&&data.query.results&&data.query.results.quote){
        let quotes=data.query.results.quote;
        if(!Array.isArray(quotes)) quotes=[quotes];
        quotes.forEach(q=>{
          if(q&&q.Symbol&&q.LastTradePriceOnly){
            prices[q.Symbol]=parseFloat(q.LastTradePriceOnly);
          }
        });
        stockOk=true;
      }
    }catch(e){
      // 야후 파이낸스 백업 프록시 API 가동
      try{
        const res=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v7/finance/quote?symbols='+allTickers.join(','))}`);
        const json=await res.json();
        const data=JSON.parse(json.contents);
        if(data&&data.quoteResponse&&data.quoteResponse.result){
          data.quoteResponse.result.forEach(q=>{
            if(q&&q.symbol&&q.regularMarketPrice){
              prices[q.symbol]=q.regularMarketPrice;
            }
          });
          stockOk=true;
        }
      }catch(err2){console.error('Stock all-origins backup failed:',err2);}
    }
  }else{stockOk=true;}

  // 수동 종목 예외 처리 (수동 가격 유지 또는 없을 시 0 처리)
  (live.stocks||[]).forEach(s=>{
    if(s.manual && prices[s.ticker]===undefined) prices[s.ticker]=10000; 
  });

  const now=new Date();
  const timeStr=`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  const statusParts=[];
  if(coinOk) statusParts.push('코인✓');
  if(fxOk) statusParts.push('환율✓');
  if(allTickers.length){
    if(stockOk) statusParts.push('주식✓');
    else statusParts.push('주식✗');
  }

  if(db&&ROOM) db.ref(`assets/${ROOM}/prices`).set({...prices,exRate,updatedAt:now.toISOString()});

  // 4. 당일 자산 데이터 변경 자동 기록 생성
  const t2=calcTotals();
  if(t2.hasPrice){
    const dateStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const histArr=[...(live.history||[])];
    const existIdx=histArr.findIndex(h=>h.date===dateStr);
    const entry={date:dateStr,total:Math.round(t2.total),crypto:Math.round(t2.crypto),stocks:Math.round(t2.stocks),etf:Math.round(t2.etf),cash:Math.round(t2.cash)};
    if(existIdx>=0) histArr[existIdx]=entry;
    else histArr.push(entry);
    histArr.sort((a,b)=>a.date>b.date?1:-1);
    fbSave('history',histArr);
    if(lu) lu.textContent=`${timeStr} ${statusParts.join(' ')} · 기록완료`;
  }else{
    if(lu) lu.textContent=`${timeStr} ${statusParts.join(' ')||'일부 실패'}`;
  }
  S.loading=false;
  render();
}

// ── 자산 그래프 그리기 내부 모듈 ─────────────────────────────────
function renderChart(hist, period, type){
  const now=new Date();
  let filtered=[...hist];
  const cutoff=new Date(now);

  if(period==='1W') cutoff.setDate(cutoff.getDate()-7);
  else if(period==='1M') cutoff.setMonth(cutoff.getMonth()-1);
  else if(period==='3M') cutoff.setMonth(cutoff.getMonth()-3);

  if(period!=='ALL'){
    const cutStr=cutoff.toISOString().split('T')[0];
    filtered=hist.filter(h=>h.date>=cutStr);
  }

  if(filtered.length<2) return `<div class="empty" style="border:none">차트를 그리기 위한 데이터가 부족합니다. (최소 2일 이상)</div>`;

  const values=filtered.map(h=>h.total);
  const min=Math.min(...values), max=Math.max(...values);
  const range=max-min===0?1:max-min;

  const width=360, height=140;
  const points=[];
  filtered.forEach((h,i)=>{
    const x=(i/(filtered.length-1))*width;
    const y=height-((h.total-min)/range)*height;
    points.push(`${x},${y}`);
  });

  return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;height:auto;overflow:visible">
    <polyline points="${points.join(' ')}" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:6px">
    <span>${filtered[0].date}</span>
    <span>최고: ${fmtWShort(max)} / 최저: ${fmtWShort(min)}</span>
    <span>${filtered[filtered.length-1].date}</span>
  </div>`;
}

      <div class="fr"><label>보유 수량 (주)</label><input id="fQty" type="number" inputmode="decimal" placeholder="0" value="${item.qty||''}"></div>
      <div class="fr"><label>통화</label><select id="fCurrency"><option value="USD" ${(item.currency||'USD')==='USD'?'selected':''}>USD (미국주식)</option><option value="KRW" ${item.currency==='KRW'?'selected':''}>KRW (한국주식)</option></select></div>
      <div class="fa"><button class="btn-c" onclick="closeForm()">취소</button><button class="btn-s" onclick="saveItem()">${isE?'수정완료':'추가'}</button></div>
    </div>`;
  }else if(S.manageType==='etf'){
    h+=`<div class="form-box ${isE?'edit':''}">
      <div class="fr"><label>ETF명</label><input id="fName" type="text" placeholder="예: TIGER 나스닥" value="${item.name||''}"></div>
      <div class="fr"><label>티커 (야후파이낸스 기준)</label><input id="fTicker" type="text" placeholder="예: 371460.KS" value="${item.ticker||''}"></div>
      <div class="fr"><label>보유 수량 (주)</label><input id="fQty" type="number" inputmode="decimal" placeholder="0" value="${item.qty||''}"></div>
      <div class="fa"><button class="btn-c" onclick="closeForm()">취소</button><button class="btn-s" onclick="saveItem()">${isE?'수정완료':'추가'}</button></div>
    </div>`;
  }else if(S.manageType==='cash'){
    h+=`<div class="form-box ${isE?'edit':''}">
      <div class="fr"><label>계좌 자산 항목명</label><input id="fName" type="text" placeholder="예: 주택청약, CMA" value="${item.name||''}"></div>
      <div class="fr"><label>금액 (원)</label><input id="fCashAmt" type="number" inputmode="numeric" placeholder="0" value="${item.amount||''}"></div>
      <div class="fr"><label>메모 (선택)</label><input id="fCashMemo" type="text" placeholder="예: KB은행, 국민은행" value="${item.memo||''}"></div>
      <div class="fa"><button class="btn-c" onclick="closeForm()">취소</button><button class="btn-s" onclick="saveItem()">${isE?'수정완료':'추가'}</button></div>
    </div>`;
  }
  return h;
}

function saveItem(){
  const type=S.manageType;
  const arr=[...(live[type]||[])];
  
  if(type==='cash'){
    const name=(document.getElementById('fName')?.value||'').trim();
    const amount=parseFloat(document.getElementById('fCashAmt')?.value||'0')||0;
    const memo=(document.getElementById('fCashMemo')?.value||'').trim();
    if(!name){alert('항목명을 입력해주세요'); return;}
    
    const newItem={id:S.editId||'cash'+Date.now(), name, amount, memo};
    if(S.editId){ const idx=arr.findIndex(i=>i.id===S.editId); if(idx>=0) arr[idx]=newItem; }
    else arr.push(newItem);
    
    fbSave('cash', arr);
  }else{
    const name=(document.getElementById('fName')?.value||'').trim();
    const qty=parseFloat(document.getElementById('fQty')?.value||'0')||0;
    if(!name){alert('이름을 입력해주세요'); return;}

    let newItem={id:S.editId||type+Date.now(), name, qty};
    if(type==='crypto'){
      newItem.market=(document.getElementById('fMarket')?.value||'').trim().toUpperCase();
    }else if(type==='stocks'){
      newItem.ticker=(document.getElementById('fTicker')?.value||'').trim().toUpperCase();
      newItem.currency=document.getElementById('fCurrency').value;
    }else if(type==='etf'){
      newItem.ticker=(document.getElementById('fTicker')?.value||'').trim().toUpperCase();
      newItem.currency='KRW';
    }

    if(S.editId){ const idx=arr.findIndex(i=>i.id===S.editId); if(idx>=0) arr[idx]=newItem; }
    else arr.push(newItem);

    fbSave(type, arr);
  }
  S.showForm=false; S.editId=null;
  render();
  updatePrices();
}

function delItem(id){
  if(!confirm('정말 삭제할까요?')) return;
  const type=S.manageType;
  const filtered=(live[type]||[]).filter(i=>i.id!==id);
  fbSave(type, filtered);
  render();
}

// ── 공유 코드 및 화면 초기 구동 로직 (수정 완료) ───────────────────────
function initApp() {
  ROOM = localStorage.getItem('asset_room');

  if (!ROOM) {
    // 1. 코드가 없으면 스타일 display를 flex로 바꿔 강제 모달 팝업
    document.getElementById('roomSetup').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
  } else {
    // 2. 이미 등록 상태면 모달 닫고 메인 앱 즉시 오픈
    document.getElementById('roomSetup').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    
    initFirebase();
    render();
    updatePrices();
  }
}

function setRoom() {
  const codeInput = document.getElementById('roomCodeInput');
  const code = (codeInput.value || '').trim();
  
  if (code.length < 3) {
    alert('공유 코드를 3자 이상 입력해주세요.');
    codeInput.focus();
    return;
  }
  
  localStorage.setItem('asset_room', code);
  ROOM = code;
  
  document.getElementById('roomSetup').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  
  initFirebase();
  render();
  updatePrices();
}

function resetRoom() {
  if (!confirm('공유 코드를 초기화할까요?')) return;
  localStorage.removeItem('asset_room');
  location.reload();
}

// DOM 생성이 끝나면 initApp 트랙 로드 구동
window.addEventListener('DOMContentLoaded', initApp);

// ── Firebase 연동 로직 ─────────────────────────────────────────
function initFirebase() {
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  db = firebase.database();
  
  db.ref('.info/connected').on('value', snap => {
    connected = !!snap.val();
    const dot = document.getElementById('dot');
    if (dot) {
      if (connected) dot.classList.remove('off');
      else dot.classList.add('off');
    }
  });

  db.ref(`assets/${ROOM}/live`).on('value', snap => {
    const val = snap.val();
    if (val) {
      live = {
        crypto: val.crypto || [],
        stocks: val.stocks || [],
        etf: val.etf || [],
        cash: val.cash || [],
        history: val.history || []
      };
      render();
    } else {
      // 파이어베이스 신규 개설 시드 데이터 저장
      db.ref(`assets/${ROOM}/live`).set({
        crypto: SEED_CRYPTO,
        stocks: SEED_STOCKS,
        etf: SEED_ETF,
        cash: SEED_CASH,
        history: SEED_HISTORY
      });
    }
  });
}

function fbSave(key, data) {
  if (db && ROOM) {
    db.ref(`assets/${ROOM}/live/${key}`).set(data);
  } else {
    live[key] = data;
    render();
  }
}
</script>
</body>
</html>
