<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="자산관리">
<title>자산 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{\n  --bg:#fff;--bg2:#f5f5f5;--bg3:#e8e8e8;\n  --text:#1a1a1a;--text2:#666;--text3:#aaa;\n  --border:#e0e0e0;--border2:#ccc;\n  --r:12px;--rs:8px;\n  --green-bg:#eaf3de;--green:#3b6d11;\n  --red-bg:#fcebeb;--red:#c0392b;\n  --acc:#2d2d2d;\n  --blue:#1a56b0;--blue-bg:#e8f0fe;\n  --gold:#b8860b;--gold-bg:#fef9e7;\n}\n@media(prefers-color-scheme:dark){:root{\n  --bg:#1c1c1c;--bg2:#2c2c2c;--bg3:#3a3a3a;\n  --text:#f5f5f5;--text2:#aaa;--text3:#666;\n  --border:#3a3a3a;--border2:#555;\n  --green-bg:#1e2f14;--green:#8cd053;\n  --red-bg:#3a1414;--red:#ff6b6b;\n  --acc:#f5f5f5;\n  --blue:#6ba5ff;--blue-bg:#1a2b4c;\n  --gold:#ffd700;--gold-bg:#3a3214;\n}}\nbody{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);padding:20px;padding-top:calc(20px + env(safe-area-inset-top));padding-bottom:calc(40px + env(safe-area-inset-bottom))}\n.card{background:var(--bg2);border-radius:var(--r);padding:16px;margin-bottom:16px;border:1px solid var(--border)}\n.flex{display:flex;justify-content:between;align-items:center}\n.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}\n.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}\n@media(max-width:480px){.grid{grid-template-columns:1fr}}\nh1{font-size:24px;font-weight:700;margin-bottom:4px;color:var(--acc)}\nh2{font-size:16px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}\n.sub{font-size:13px;color:var(--text2);margin-bottom:16px}\n.val{font-size:20px;font-weight:700;margin-top:4px}\n.lbl{font-size:12px;color:var(--text2)}\ntable{width:100%;border-collapse:collapse;margin-top:8px;font-size:14px}\nth,td{padding:10px 8px;text-align:right;border-bottom:1px solid var(--border)}\nth{color:var(--text2);font-weight:500;font-size:12px}\ntd.left,th.left{text-align:left}\n.up{color:var(--red);background:var(--red-bg);border-radius:4px;padding:2px 4px;font-size:12px;font-weight:600}\n.dn{color:var(--blue);background:var(--blue-bg);border-radius:4px;padding:2px 4px;font-size:12px;font-weight:600}\n.zero{color:var(--text2);background:var(--bg3);border-radius:4px;padding:2px 4px;font-size:12px}\nbtn,button,.btn{display:inline-flex;align-items:center;justify-content:center;background:var(--acc);color:var(--bg);border:none;border-radius:var(--rs);padding:8px 12px;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none}\n.btn-s{padding:4px 8px;font-size:11px;border-radius:6px}\n.btn-out{background:transparent;color:var(--text);border:1px solid var(--border2)}\n.btn-red{background:var(--red);color:#fff}\ninput,select,textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:var(--rs);padding:10px;font-size:14px;margin-bottom:12px;outline:none;appearance:none;-webkit-appearance:none}\ninput:focus,select:focus{border-color:var(--text)}\n.pop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}\n.pop-con{background:var(--bg);border-radius:var(--r);padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;border:1px solid var(--border)}\n.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}\n.tab{padding:8px 12px;font-size:14px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent}\n.tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}\n.memo{font-size:11px;color:var(--text3);margin-top:2px}\n.badge{font-size:10px;padding:2px 4px;border-radius:4px;margin-left:4px;font-weight:normal}\n.bg-stk{background:var(--red-bg);color:var(--red)}\n.bg-cry{background:var(--gold-bg);color:var(--gold)}\n.bg-csh{background:var(--blue-bg);color:var(--blue)}\n</style>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div id="roomSetup" style="display:block;max-width:400px;margin:100px auto auto auto;padding:20px;" class="card">
  <h2 style="margin-bottom:4px">자산관리 공유 코드</h2>
  <p class="sub">동기화할 방 코드를 입력하세요 (최소 3자)</p>
  <input type="text" id="roomCodeInput" placeholder="예: myfamily123" onkeyup="if(event.key==='Enter')setRoom()">
  <button onclick="setRoom()" style="width:100%">완료</button>
</div>

<div id="mainApp" style="display:none">
  <div class="flex" style="margin-bottom:4px;justify-content:space-between;align-items:flex-start">
    <div>
      <h1 id="totalAsset">0원</h1>
      <div class="sub" style="margin-bottom:0" id="totalEvalSub">총 자산 (평가금액 기준)</div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn-out btn-s" onclick="updatePrices()">새로고침</button>
      <button class="btn-out btn-s" onclick="resetRoom()">코드변경</button>
    </div>
  </div>

  <div class="grid" style="margin-bottom:16px">
    <div class="card" style="margin-bottom:0">
      <div class="lbl">투자 자산 원금 / 평가</div>
      <div class="val" id="investSummary" style="font-size:16px">0 / 0</div>
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="lbl">총 수익률 (투자자산)</div>
      <div class="val" id="totalRate" style="font-size:16px">0%</div>
    </div>
  </div>

  <div class="card">
    <h2>
      <span>주식 <span class="badge bg-stk" id="stkSize">0</span></span>
      <button class="btn-s" onclick="openForm('stock')">추가</button>
    </h2>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr><th class="left">종목</th><th>보유/매입</th><th>현재가</th><th>평가/수익</th></tr>
        </thead>
        <tbody id="stockBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>
      <span>가상자산 <span class="badge bg-cry" id="crySize">0</span></span>
      <button class="btn-s" onclick="openForm('crypto')">추가</button>
    </h2>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr><th class="left">종목</th><th>보유/매입</th><th>현재가</th><th>평가/수익</th></tr>
        </thead>
        <tbody id="cryptoBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>
      <span>현금 및 기타 <span class="badge bg-csh" id="cashSize">0</span></span>
      <button class="btn-s" onclick="openForm('cash')">추가</button>
    </h2>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr><th class="left">항목명</th><th>금액</th><th>메모</th><th>관리</th></tr>
        </thead>
        <tbody id="cashBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="pop" id="popForm" style="display:none">
  <div class="pop-con">
    <h2 id="popTitle">자산 추가</h2>
    <div id="formStock">
      <label class="lbl">종목코드</label>
      <input type="text" id="fStkCode" placeholder="예: 005930 또는 AAPL">
      <label class="lbl">종목명</label>
      <input type="text" id="fStkName" placeholder="예: 삼성전자">
      <div class="grid">
        <div>
          <label class="lbl">보유수량</label>
          <input type="number" id="fStkQty" step="any" value="0">
        </div>
        <div>
          <label class="lbl">평균매입가</label>
          <input type="number" id="fStkPrice" step="any" value="0">
        </div>
      </div>
    </div>
    <div id="formCrypto" style="display:none">
      <label class="lbl">심볼 (대문자)</label>
      <input type="text" id="fCryCode" placeholder="예: BTC">
      <label class="lbl">자산명</label>
      <input type="text" id="fCryName" placeholder="예: 비트코인">
      <div class="grid">
        <div>
          <label class="lbl">보유수량</label>
          <input type="number" id="fCryQty" step="any" value="0">
        </div>
        <div>
          <label class="lbl">평균매입가 (원)</label>
          <input type="number" id="fCryPrice" step="any" value="0">
        </div>
      </div>
    </div>
    <div id="formCash" style="display:none">
      <label class="lbl">항목명</label>
      <input type="text" id="fCashName" placeholder="예: 신한은행 통장">
      <label class="lbl">금액 (원)</label>
      <input type="number" id="fCashAmt" value="0">
      <label class="lbl">메모</label>
      <input type="text" id="fCashMemo" placeholder="간단한 메모">
    </div>
    <div class="grid" style="margin-top:12px">
      <button class="btn-out" onclick="closeForm()">취소</button>
      <button onclick="saveForm()">저장</button>
    </div>
    <div id="popDelBtnArea" style="margin-top:12px;text-align:center;display:none">
      <button class="btn-red btn-s" style="width:100%" id="popDelBtn">삭제하기</button>
    </div>
  </div>
</div>

<script>
// ── 기본 상태 및 글로벌 변수 ─────────────────────────────────────
let ROOM = '';
let db = null;
let live = { stock:[], crypto:[], cash:[] };
let PRICES = { stock:{}, crypto:{} };
let S = { mode:'stock', editId:null, showForm:false };

// Firebase 초기화 config (실제 사용하시는 계정 정보로 자동 연동되거나 기존 구조 유지)
const firebaseConfig = {
  databaseURL: "https://asset-a9914-default-rtdb.firebaseio.com/"
};

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('asset_room');
  if(saved && saved.trim().length >= 3){
    ROOM = saved.trim();
    document.getElementById('roomSetup').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    initFirebase();
    render();
    updatePrices();
  }
});

function initFirebase(){
  if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  db.ref('rooms/' + ROOM).on('value', (snapshot) => {
    const data = snapshot.val() || {};
    live.stock = data.stock || [];
    live.crypto = data.crypto || [];
    live.cash = data.cash || [];
    render();
  });
}

function fbSave(type, data){
  if(!db) return;
  db.ref('rooms/' + ROOM + '/' + type).set(data);
}

// ── 핵심 가격 업데이트 로직 (네이버 파이낸스 및 올바른 우회 코인 처리) ────────────────
async function updatePrices() {
  console.log('시세 업데이트 시작...');
  
  // 1. 주식 가격 가져오기 (국내주식: 네이버 파이낸스 우회, 해외주식: 야후파이낸스 또는 기존 방식 보완)
  if (live.stock && live.stock.length > 0) {
    for (let s of live.stock) {
      const code = s.code ? s.code.trim() : '';
      if (!code) continue;
      
      try {
        // 숫자로만 된 6자리인 경우 국장(네이버 파이낸스 미러), 영문인 경우 미장 처리
        if (/^\d{6}$/.test(code)) {
          // 국내 주식: 네이버 금융 실시간 시세 시크릿 API 활용 (CORS 우회 허브 적용)
          const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://polling.finance.naver.com/api/realtime/site/domestic/index?isMain=false&stockCodes=' + code)}`);
          if (res.ok) {
            const json = await res.json();
            const parsed = JSON.parse(json.contents);
            if (parsed.result && parsed.result.areas && parsed.result.areas[0] && parsed.result.areas[0].datas[0]) {
              const price = parseFloat(parsed.result.areas[0].datas[0].nv); // 현재가
              if (price > 0) PRICES.stock[s.code] = price;
            }
          }
        } else {
          // 해외 주식: 영문 코드일 경우 야후 파이낸스 프로시 처리
          const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + code.toUpperCase())}`);
          if (res.ok) {
            const json = await res.json();
            const parsed = JSON.parse(json.contents);
            const price = parsed.chart.result[0].meta.regularMarketPrice;
            if (price > 0) PRICES.stock[s.code] = price;
          }
        }
      } catch (e) {
        console.error('주식 가격 로드 실패:', code, e);
      }
    }
  }

  // 2. 가상자산 가격 가져오기 (업비트 KRW 시장 전체 조회 후 매핑 - CORS 허브 결합)
  if (live.crypto && live.crypto.length > 0) {
    try {
      const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.upbit.com/v1/ticker?markets=' + live.crypto.map(c => 'KRW-' + c.code.toUpperCase()).join(','))}`);
      if (res.ok) {
        const json = await res.json();
        const tickers = JSON.parse(json.contents);
        if (Array.isArray(tickers)) {
          tickers.forEach(t => {
            const symbol = t.market.replace('KRW-', '');
            PRICES.crypto[symbol] = parseFloat(t.trade_price);
          });
        }
      }
    } catch (e) {
      console.error('코인 가격 로드 실패:', e);
    }
  }

  render();
}

// ── 화면 렌더링 함수 ──────────────────────────────────────────────
function render(){
  let totalAsset = 0;
  let totalInvestPrice = 0;
  let totalInvestEval = 0;

  // 1. 주식 테이블 생성
  const sBody = document.getElementById('stockBody');
  sBody.innerHTML = '';
  document.getElementById('stkSize').innerText = live.stock.length;
  
  live.stock.forEach((s, idx) => {
    const curPrice = PRICES.stock[s.code] || s.price || 0;
    const buyAmt = (s.qty || 0) * (s.price || 0);
    const evalAmt = (s.qty || 0) * curPrice;
    const diff = evalAmt - buyAmt;
    const rate = buyAmt > 0 ? (diff / buyAmt) * 100 : 0;
    
    totalInvestPrice += buyAmt;
    totalInvestEval += evalAmt;
    totalAsset += evalAmt;

    const tr = document.createElement('tr');
    tr.style.cursor = 'pointer';
    tr.onclick = () => openEditForm('stock', s, idx);
    tr.innerHTML = `
      <td class="left"><strong>${s.name}</strong><div class="memo">${s.code}</div></td>
      <td>${nf(s.qty)}<div class="memo">${nf(s.price)}</div></td>
      <td><strong>${nf(curPrice)}</strong></td>
      <td>${nf(evalAmt)}<div class="memo"><span class="${diff>0?'up':diff<0?'dn':'zero'}">${diff>0?'+':''}${rate.toFixed(2)}%</span></div></td>
    `;
    sBody.appendChild(tr);
  });

  // 2. 가상자산 테이블 생성
  const cBody = document.getElementById('cryptoBody');
  cBody.innerHTML = '';
  document.getElementById('crySize').innerText = live.crypto.length;

  live.crypto.forEach((c, idx) => {
    const curPrice = PRICES.crypto[c.code.toUpperCase()] || c.price || 0;
    const buyAmt = (c.qty || 0) * (c.price || 0);
    const evalAmt = (c.qty || 0) * curPrice;
    const diff = evalAmt - buyAmt;
    const rate = buyAmt > 0 ? (diff / buyAmt) * 100 : 0;

    totalInvestPrice += buyAmt;
    totalInvestEval += evalAmt;
    totalAsset += evalAmt;

    const tr = document.createElement('tr');
    tr.style.cursor = 'pointer';
    tr.onclick = () => openEditForm('crypto', c, idx);
    tr.innerHTML = `
      <td class="left"><strong>${c.name}</strong><div class="memo">${c.code.toUpperCase()}</div></td>
      <td>${nf(c.qty)}<div class="memo">${nf(c.price)}</div></td>
      <td><strong>${nf(curPrice)}</strong></td>
      <td>${nf(evalAmt)}<div class="memo"><span class="${diff>0?'up':diff<0?'dn':'zero'}">${diff>0?'+':''}${rate.toFixed(2)}%</span></div></td>
    `;
    cBody.appendChild(tr);
  });

  // 3. 현금 테이블 생성
  const cashBody = document.getElementById('cashBody');
  cashBody.innerHTML = '';
  document.getElementById('cashSize').innerText = live.cash.length;

  live.cash.forEach((c, idx) => {
    totalAsset += (c.amount || 0);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="left"><strong>${c.name}</strong></td>
      <td><strong>${nf(c.amount)}원</strong></td>
      <td class="memo" style="max-width:120px;word-break:break-all">${c.memo||''}</td>
      <td><button class="btn-out btn-s" onclick="event.stopPropagation();openEditForm('cash', '${c.id}', ${idx})">수정</button></td>
    `;
    cashBody.appendChild(tr);
  });

  // 상단 요약 바 업데이트
  document.getElementById('totalAsset').innerText = nf(Math.round(totalAsset)) + '원';
  document.getElementById('investSummary').innerText = nf(Math.round(totalInvestPrice)) + ' / ' + nf(Math.round(totalInvestEval));
  
  const totalDiff = totalInvestEval - totalInvestPrice;
  const totalRate = totalInvestPrice > 0 ? (totalDiff / totalInvestPrice) * 100 : 0;
  const rateEl = document.getElementById('totalRate');
  rateEl.innerText = (totalDiff > 0 ? '+' : '') + totalRate.toFixed(2) + '%';
  rateEl.className = 'val ' + (totalDiff > 0 ? 'up' : totalDiff < 0 ? 'dn' : 'zero');
}

function nf(val){
  if(val === undefined || val === null) return '0';
  if(typeof val === 'number') {
    if(val % 1 !== 0) return val.toLocaleString(undefined, {maximumFractionDigits:4});
    return val.toLocaleString();
  }
  return val;
}

// ── 입력 / 수정 팝업 제어 ──────────────────────────────────────────
function openForm(type) {
  S.mode = type;
  S.editId = null;
  document.getElementById('popTitle').innerText = (type==='stock'?'주식':type==='crypto'?'가상자산':'현금') + ' 추가';
  document.getElementById('formStock').style.display = type==='stock'?'block':'none';
  document.getElementById('formCrypto').style.display = type==='crypto'?'block':'none';
  document.getElementById('formCash').style.display = type==='cash'?'block':'none';
  document.getElementById('popDelBtnArea').style.display = 'none';
  
  // 폼 초기화
  document.getElementById('fStkCode').value = '';
  document.getElementById('fStkName').value = '';
  document.getElementById('fStkQty').value = '0';
  document.getElementById('fStkPrice').value = '0';
  document.getElementById('fCryCode').value = '';
  document.getElementById('fCryName').value = '';
  document.getElementById('fCryQty').value = '0';
  document.getElementById('fCryPrice').value = '0';
  document.getElementById('fCashName').value = '';
  document.getElementById('fCashAmt').value = '0';
  document.getElementById('fCashMemo').value = '';

  document.getElementById('popForm').style.display = 'flex';
}

function openEditForm(type, objOrId, idx) {
  S.mode = type;
  document.getElementById('popTitle').innerText = (type==='stock'?'주식':type==='crypto'?'가상자산':'현금') + ' 수정/삭제';
  document.getElementById('formStock').style.display = type==='stock'?'block':'none';
  document.getElementById('formCrypto').style.display = type==='crypto'?'block':'none';
  document.getElementById('formCash').style.display = type==='cash'?'block':'none';
  
  const delBtn = document.getElementById('popDelBtn');

  if(type === 'stock') {
    S.editId = idx;
    const item = live.stock[idx];
    document.getElementById('fStkCode').value = item.code || '';
    document.getElementById('fStkName').value = item.name || '';
    document.getElementById('fStkQty').value = item.qty || 0;
    document.getElementById('fStkPrice').value = item.price || 0;
    delBtn.onclick = () => delItem('stock', idx);
  } else if(type === 'crypto') {
    S.editId = idx;
    const item = live.crypto[idx];
    document.getElementById('fCryCode').value = item.code || '';
    document.getElementById('fCryName').value = item.name || '';
    document.getElementById('fCryQty').value = item.qty || 0;
    document.getElementById('fCryPrice').value = item.price || 0;
    delBtn.onclick = () => delItem('crypto', idx);
  } else if(type === 'cash') {
    S.editId = objOrId; // id 문자열 전달됨
    const item = live.cash[idx];
    document.getElementById('fCashName').value = item.name || '';
    document.getElementById('fCashAmt').value = item.amount || 0;
    document.getElementById('fCashMemo').value = item.memo || '';
    delBtn.onclick = () => delItem('cash', objOrId);
  }

  document.getElementById('popDelBtnArea').style.display = 'block';
  document.getElementById('popForm').style.display = 'flex';
}

function closeForm() {
  document.getElementById('popForm').style.display = 'none';
}

function saveForm() {
  if(S.mode === 'stock') {
    const code = document.getElementById('fStkCode').value.trim();
    const name = document.getElementById('fStkName').value.trim();
    const qty = parseFloat(document.getElementById('fStkQty').value || '0') || 0;
    const price = parseFloat(document.getElementById('fStkPrice').value || '0') || 0;
    if(!code || !name) { alert('종목코드와 명칭을 입력하세요'); return; }
    
    let arr = [...live.stock];
    const newItem = { code, name, qty, price };
    if(S.editId !== null) arr[S.editId] = newItem;
    else arr.push(newItem);
    fbSave('stock', arr);

  } else if(S.mode === 'crypto') {
    const code = document.getElementById('fCryCode').value.trim().toUpperCase();
    const name = document.getElementById('fCryName').value.trim();
    const qty = parseFloat(document.getElementById('fCryQty').value || '0') || 0;
    const price = parseFloat(document.getElementById('fCryPrice').value || '0') || 0;
    if(!code || !name) { alert('심볼과 자산명을 입력하세요'); return; }
    
    let arr = [...live.crypto];
    const newItem = { code, name, qty, price };
    if(S.editId !== null) arr[S.editId] = newItem;
    else arr.push(newItem);
    fbSave('crypto', arr);

  } else if(S.mode === 'cash') {
    const name = document.getElementById('fCashName').value.trim();
    const amount = parseFloat(document.getElementById('fCashAmt').value || '0') || 0;
    const memo = document.getElementById('fCashMemo').value.trim();
    if(!name) { alert('항목명을 입력해주세요'); return; }
    
    let arr = [...live.cash];
    const newItem = { id: S.editId || 'cash'+Date.now(), name, amount, memo };
    if(S.editId) {
      const idx = arr.findIndex(i => i.id === S.editId);
      if(idx >= 0) arr[idx] = newItem;
    } else {
      arr.push(newItem);
    }
    fbSave('cash', arr);
  }
  
  closeForm();
  updatePrices();
}

function delItem(type, target) {
  if(!confirm('삭제할까요?')) return;
  if(type === 'cash') {
    fbSave('cash', live.cash.filter(i => i.id !== target));
  } else {
    fbSave(type, live.type = live[type].filter((_, idx) => idx !== target));
  }
  closeForm();
  updatePrices();
}

// ── 공통 설정 제어 함수 ──────────────────────────────────────────
function setRoom(){
  const code = (document.getElementById('roomCodeInput').value || '').trim();
  if(code.length < 3){ alert('3자 이상 입력해주세요'); return; }
  localStorage.setItem('asset_room', code);
  ROOM = code;
  document.getElementById('roomSetup').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  initFirebase();
  updatePrices();
}

function resetRoom(){
  if(!confirm('공유 코드를 초기화할까요?')) return;
  localStorage.removeItem('asset_room');
  location.reload();
}
</script>
